// ============================================================
// PRESET LAYOUTS — return array of {furnId, xFt, yFt, rotation}
// ============================================================

function presetTheatre(space) {
  const items = [];
  const startY = 16; // below stage
  const endY = space.depthFt - 4;
  const chairSpacing = 2; // ft
  const rowSpacing = 3;
  const aisleWidth = 4;
  const halfWidth = (space.widthFt - aisleWidth) / 2;
  const seatsPerHalf = Math.floor(halfWidth / chairSpacing);
  const startXLeft = (space.widthFt - aisleWidth) / 2 - seatsPerHalf * chairSpacing + 1;
  const startXRight = (space.widthFt + aisleWidth) / 2 + 1;
  for (let y = startY; y <= endY - rowSpacing; y += rowSpacing) {
    for (let i = 0; i < seatsPerHalf; i++) {
      items.push({ furnId: 'theatre-chair', xFt: startXLeft + i * chairSpacing, yFt: y });
      items.push({ furnId: 'theatre-chair', xFt: startXRight + i * chairSpacing, yFt: y });
    }
  }
  return items;
}

function presetBanquet(space) {
  const items = [];
  const tableSize = 6; // diameter
  const tableSpacingX = 9;
  const tableSpacingY = 9;
  const startY = 18;
  const endY = space.depthFt - 6;
  const cols = Math.floor((space.widthFt - 6) / tableSpacingX);
  const offsetX = (space.widthFt - (cols - 1) * tableSpacingX) / 2 - tableSize / 2;
  for (let y = startY; y <= endY - tableSpacingY; y += tableSpacingY) {
    for (let c = 0; c < cols; c++) {
      const tx = offsetX + c * tableSpacingX;
      items.push({ furnId: 'round-72', xFt: tx, yFt: y });
      // 10 chairs around each table
      const cx = tx + tableSize / 2;
      const cy = y + tableSize / 2;
      const r = tableSize / 2 + 1;
      for (let k = 0; k < 10; k++) {
        const a = (k / 10) * Math.PI * 2;
        items.push({
          furnId: 'banquet-chair',
          xFt: cx + Math.cos(a) * r - 0.75,
          yFt: cy + Math.sin(a) * r - 0.75,
        });
      }
    }
  }
  return items;
}

function presetClassroom(space) {
  const items = [];
  const startY = 16;
  const endY = space.depthFt - 4;
  const rowSpacing = 5;
  const tableW = 6;
  const tablesPerRow = Math.floor((space.widthFt - 4) / (tableW + 1));
  const offsetX = (space.widthFt - (tablesPerRow * (tableW + 1) - 1)) / 2;
  for (let y = startY; y <= endY - rowSpacing; y += rowSpacing) {
    for (let i = 0; i < tablesPerRow; i++) {
      const tx = offsetX + i * (tableW + 1);
      items.push({ furnId: 'rect-6', xFt: tx, yFt: y });
      // 3 chairs on the audience side (facing stage = facing up)
      items.push({ furnId: 'banquet-chair', xFt: tx + 0.5, yFt: y + 2.7 });
      items.push({ furnId: 'banquet-chair', xFt: tx + 2.25, yFt: y + 2.7 });
      items.push({ furnId: 'banquet-chair', xFt: tx + 4, yFt: y + 2.7 });
    }
  }
  return items;
}

function presetUShape(space) {
  const items = [];
  const startY = 18;
  const endY = space.depthFt - 12;
  const sideX1 = space.widthFt / 2 - 8;
  const sideX2 = space.widthFt / 2 + 5;
  // Top of U (closest to stage) — horizontal tables
  for (let i = 0; i < 3; i++) {
    items.push({ furnId: 'rect-6', xFt: sideX1 + i * 6, yFt: startY });
    items.push({ furnId: 'banquet-chair', xFt: sideX1 + 0.5 + i * 6, yFt: startY - 2 });
    items.push({ furnId: 'banquet-chair', xFt: sideX1 + 2.25 + i * 6, yFt: startY - 2 });
    items.push({ furnId: 'banquet-chair', xFt: sideX1 + 4 + i * 6, yFt: startY - 2 });
  }
  // Left side of U — vertical tables
  for (let y = startY + 4; y < endY; y += 6) {
    items.push({ furnId: 'rect-6', xFt: sideX1, yFt: y, rotation: 90 });
    items.push({ furnId: 'banquet-chair', xFt: sideX1 - 2, yFt: y + 0.5 });
    items.push({ furnId: 'banquet-chair', xFt: sideX1 - 2, yFt: y + 2.25 });
    items.push({ furnId: 'banquet-chair', xFt: sideX1 - 2, yFt: y + 4 });
  }
  // Right side of U
  for (let y = startY + 4; y < endY; y += 6) {
    items.push({ furnId: 'rect-6', xFt: sideX2 + 2.5, yFt: y, rotation: 90 });
    items.push({ furnId: 'banquet-chair', xFt: sideX2 + 5, yFt: y + 0.5 });
    items.push({ furnId: 'banquet-chair', xFt: sideX2 + 5, yFt: y + 2.25 });
    items.push({ furnId: 'banquet-chair', xFt: sideX2 + 5, yFt: y + 4 });
  }
  return items;
}

function presetBoardroom(space) {
  const items = [];
  const cy = space.depthFt / 2 + 4;
  const cx = space.widthFt / 2;
  // 3 rectangular tables in a row to make a long boardroom table
  for (let i = -1; i <= 1; i++) {
    items.push({ furnId: 'rect-8', xFt: cx - 4, yFt: cy + i * 2.5 - 1.25 });
  }
  // Chairs around long sides
  for (let i = 0; i < 6; i++) {
    items.push({ furnId: 'banquet-chair', xFt: cx - 4 + i * 1.4, yFt: cy - 5.5 });
    items.push({ furnId: 'banquet-chair', xFt: cx - 4 + i * 1.4, yFt: cy + 4 });
  }
  // Chairs at the ends
  items.push({ furnId: 'banquet-chair', xFt: cx - 5.5, yFt: cy - 0.75 });
  items.push({ furnId: 'banquet-chair', xFt: cx + 4.5, yFt: cy - 0.75 });
  return items;
}

function presetReception(space) {
  const items = [];
  const cols = Math.floor(space.widthFt / 8);
  const rows = Math.floor((space.depthFt - 14) / 8);
  const offsetX = (space.widthFt - cols * 8) / 2 + 4;
  const offsetY = 16;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      // Stagger
      const ox = (r % 2 === 0) ? 0 : 4;
      const x = offsetX + c * 8 + ox - 1.25;
      const y = offsetY + r * 8 - 1.25;
      if (x < space.widthFt - 3 && y < space.depthFt - 4) {
        items.push({ furnId: 'cocktail', xFt: x, yFt: y });
      }
    }
  }
  return items;
}

function FloorPlanCanvas({ space, items, onMove, onSelect, selectedId, onDeselect }) {
  const canvasRef = useRef(null);
  const draggingRef = useRef(null);

  const widthPx = ftToPx(space.widthFt);
  const depthPx = ftToPx(space.depthFt);

  const handleMouseDown = (e, item) => {
    e.stopPropagation();
    onSelect(item.id);
    const rect = canvasRef.current.getBoundingClientRect();
    draggingRef.current = {
      id: item.id,
      offsetX: e.clientX - rect.left - ftToPx(item.xFt),
      offsetY: e.clientY - rect.top - ftToPx(item.yFt),
    };
  };

  const handleMouseMove = (e) => {
    if (!draggingRef.current) return;
    const rect = canvasRef.current.getBoundingClientRect();
    const xPx = e.clientX - rect.left - draggingRef.current.offsetX;
    const yPx = e.clientY - rect.top - draggingRef.current.offsetY;
    onMove(draggingRef.current.id, pxToFt(xPx), pxToFt(yPx));
  };

  const handleMouseUp = () => {
    draggingRef.current = null;
  };

  useEffect(() => {
    window.addEventListener('mousemove', handleMouseMove);
    window.addEventListener('mouseup', handleMouseUp);
    return () => {
      window.removeEventListener('mousemove', handleMouseMove);
      window.removeEventListener('mouseup', handleMouseUp);
    };
  });

  return (
    <div
      ref={canvasRef}
      onClick={onDeselect}
      className="floor-grid relative bg-[#0a0c10] border-2 border-[var(--tv-line)] mx-auto"
      style={{ width: widthPx, height: depthPx }}
    >
      {/* Fixtures (stage, doors) */}
      {space.fixtures.map((f, i) => (
        <div
          key={i}
          className={classNames(
            "absolute flex items-center justify-center text-[10px] font-medium",
            f.type === 'stage' ? 'bg-gradient-to-b from-[#4a2638] to-[#1c1419] text-amber-200 border-2 border-amber-700/40'
            : 'bg-emerald-900/30 text-emerald-300/60 border border-dashed border-emerald-600/40'
          )}
          style={{
            left: ftToPx(f.x),
            top: ftToPx(f.y),
            width: ftToPx(f.w),
            height: ftToPx(f.h),
          }}
        >
          {f.type === 'stage' ? f.label : ''}
        </div>
      ))}

      {/* Placed items */}
      {items.map(item => {
        const f = FURN_BY_ID[item.furnId];
        if (!f) return null;
        const isSelected = item.id === selectedId;
        if (f.shape === 'circle') {
          const d = ftToPx(f.diameter);
          return (
            <div
              key={item.id}
              onMouseDown={e => handleMouseDown(e, item)}
              className={classNames(
                "absolute rounded-full item-handle item-shadow flex items-center justify-center text-[8px] font-semibold",
                isSelected ? "ring-2 ring-[var(--tv-gold)] ring-offset-1 ring-offset-[#0a0c10]" : ""
              )}
              style={{
                left: ftToPx(item.xFt),
                top: ftToPx(item.yFt),
                width: d,
                height: d,
                background: f.color,
                color: f.id === 'cocktail' ? '#c8a96a' : '#cfd6e4',
              }}
              title={f.label}
            >
              {f.id === 'cocktail' ? '◯' : f.capacity}
            </div>
          );
        }
        return (
          <div
            key={item.id}
            onMouseDown={e => handleMouseDown(e, item)}
            className={classNames(
              "absolute item-handle item-shadow flex items-center justify-center text-[8px] font-semibold",
              isSelected ? "ring-2 ring-[var(--tv-gold)] ring-offset-1 ring-offset-[#0a0c10]" : "",
              f.type === 'chair' ? 'rounded-sm' : 'rounded'
            )}
            style={{
              left: ftToPx(item.xFt),
              top: ftToPx(item.yFt),
              width: ftToPx(item.rotation === 90 ? f.h : f.w),
              height: ftToPx(item.rotation === 90 ? f.w : f.h),
              background: f.color,
              color: '#cfd6e4',
              transform: item.rotation ? `rotate(${item.rotation}deg)` : undefined,
              transformOrigin: 'center',
            }}
            title={f.label}
          >
            {f.type === 'chair' ? '' : f.type === 'fixture' ? f.label.split(' ')[0] : f.capacity}
          </div>
        );
      })}

      {/* Scale ruler */}
      <div className="absolute -bottom-6 left-0 right-0 flex justify-between text-[10px] tv-muted">
        <span>0 ft</span>
        <span>{space.widthFt} ft wide</span>
      </div>
      <div className="absolute top-0 -left-10 bottom-0 flex flex-col justify-between text-[10px] tv-muted">
        <span>0 ft</span>
        <span>{space.depthFt} ft</span>
      </div>
    </div>
  );
}

function Designer({ events, currentEvent, onSaveEvent }) {
  const [spaceId, setSpaceId] = useState(currentEvent?.space || 'A');
  const space = SPACES[spaceId];
  const [items, setItems] = useState([]);
  const [selectedId, setSelectedId] = useState(null);
  const [eventName, setEventName] = useState(currentEvent?.name || 'Untitled Event');
  const [eventClient, setEventClient] = useState(currentEvent?.client || '');
  const [eventGuests, setEventGuests] = useState(currentEvent?.guests || 200);
  const [showSaved, setShowSaved] = useState(false);

  // Initialize layout when event or space changes
  useEffect(() => {
    if (currentEvent?.preset) {
      applyPreset(currentEvent.preset);
    }
    // eslint-disable-next-line
  }, [currentEvent?.id, spaceId]);

  const applyPreset = (presetId) => {
    const preset = PRESETS.find(p => p.id === presetId);
    if (!preset) return;
    const placed = preset.fn(space).map(it => ({ ...it, id: uid() }));
    setItems(placed);
    setSelectedId(null);
  };

  const addItem = (furnId) => {
    const f = FURN_BY_ID[furnId];
    const size = f.shape === 'circle' ? f.diameter : Math.max(f.w, f.h);
    const it = {
      id: uid(),
      furnId,
      xFt: space.widthFt / 2 - size / 2,
      yFt: space.depthFt / 2 - size / 2,
    };
    setItems(prev => [...prev, it]);
    setSelectedId(it.id);
  };

  const moveItem = (id, xFt, yFt) => {
    const clamped = (v, max, size) => Math.max(0, Math.min(max - size, v));
    setItems(prev => prev.map(it => {
      if (it.id !== id) return it;
      const f = FURN_BY_ID[it.furnId];
      const w = f.shape === 'circle' ? f.diameter : (it.rotation === 90 ? f.h : f.w);
      const h = f.shape === 'circle' ? f.diameter : (it.rotation === 90 ? f.w : f.h);
      return { ...it, xFt: clamped(xFt, space.widthFt, w), yFt: clamped(yFt, space.depthFt, h) };
    }));
  };

  const deleteItem = (id) => {
    setItems(prev => prev.filter(it => it.id !== id));
    setSelectedId(null);
  };

  const rotateItem = (id) => {
    setItems(prev => prev.map(it => it.id === id ? { ...it, rotation: ((it.rotation || 0) + 90) % 360 } : it));
  };

  const duplicateItem = (id) => {
    const orig = items.find(it => it.id === id);
    if (!orig) return;
    const copy = { ...orig, id: uid(), xFt: orig.xFt + 2, yFt: orig.yFt + 2 };
    setItems(prev => [...prev, copy]);
    setSelectedId(copy.id);
  };

  const clearAll = () => {
    if (window.confirm('Clear all items from the floor?')) {
      setItems([]);
      setSelectedId(null);
    }
  };

  // Stats
  const stats = useMemo(() => {
    let chairs = 0, tables = 0, capacity = 0;
    items.forEach(it => {
      const f = FURN_BY_ID[it.furnId];
      if (!f) return;
      if (f.type === 'chair') chairs++;
      else if (f.type === 'table') tables++;
      capacity += f.capacity;
    });
    // Effective seating capacity: count chairs OR seat-capacity from tables, whichever is the design intent.
    // For banquet rounds, capacity is the table's seat count.
    return { chairs, tables, capacity, total: items.length };
  }, [items]);

  const selected = items.find(it => it.id === selectedId);
  const selectedFurn = selected ? FURN_BY_ID[selected.furnId] : null;

  const handleSave = () => {
    setShowSaved(true);
    setTimeout(() => setShowSaved(false), 2000);
  };

  return (
    <div className="flex-1 flex flex-col overflow-hidden">
      <TopBar
        title="Layout Designer"
        subtitle="Drag furniture onto the floor or apply a preset to start."
        right={
          <>
            <button onClick={clearAll} className="px-3 py-2 text-sm rounded border tv-divider tv-panel-2 hover:border-red-400 hover:text-red-300">Clear</button>
            <button className="px-3 py-2 text-sm rounded border tv-divider tv-panel-2 hover:border-[var(--tv-gold)]">Export PDF</button>
            <button onClick={handleSave} className="px-4 py-2 text-sm tv-gold-bg font-medium rounded">
              {showSaved ? '✓ Saved' : 'Save Layout'}
            </button>
          </>
        }
      />

      <div className="flex-1 flex overflow-hidden">
        {/* LEFT: Furniture library + Event info */}
        <div className="w-72 tv-panel border-r tv-divider flex flex-col flex-shrink-0">
          <div className="p-4 border-b tv-divider">
            <div className="text-xs uppercase tv-muted tracking-wider mb-2">Event</div>
            <input value={eventName} onChange={e => setEventName(e.target.value)} className="w-full mb-2 text-sm font-medium" />
            <input value={eventClient} onChange={e => setEventClient(e.target.value)} placeholder="Client name" className="w-full mb-2 text-xs" />
            <div className="flex items-center gap-2">
              <select value={spaceId} onChange={e => setSpaceId(e.target.value)} className="flex-1 text-xs">
                <option value="A">Space A — Ballroom</option>
                <option value="B">Space B — Buffet/Breakout</option>
                <option value="C">Space C — Breakout Room</option>
              </select>
              <input type="number" value={eventGuests} onChange={e => setEventGuests(Number(e.target.value))} className="w-16 text-xs" />
            </div>
          </div>

          <div className="p-4 border-b tv-divider">
            <div className="text-xs uppercase tv-muted tracking-wider mb-2">Quick presets</div>
            <div className="grid grid-cols-2 gap-2">
              {PRESETS.map(p => (
                <button key={p.id} onClick={() => applyPreset(p.id)}
                  className="tv-panel-2 border tv-divider rounded p-2 text-left hover:border-[var(--tv-gold)]">
                  <div className="text-base">{p.icon}</div>
                  <div className="text-xs font-medium mt-0.5">{p.label}</div>
                  <div className="text-[10px] tv-muted">{p.desc}</div>
                </button>
              ))}
            </div>
          </div>

          <div className="flex-1 overflow-auto scroll-thin p-4">
            <div className="text-xs uppercase tv-muted tracking-wider mb-2">Add furniture</div>
            <div className="space-y-1">
              {FURNITURE_LIBRARY.map(f => (
                <button key={f.id} onClick={() => addItem(f.id)}
                  className="w-full flex items-center gap-3 px-2 py-2 rounded hover:bg-[#1d212d] text-left">
                  <div className="w-7 h-7 rounded flex items-center justify-center flex-shrink-0"

                    <div className="text-xs font-medium truncate">{f.label}</div>

                      {f.shape === 'circle' ? `${f.diameter}' dia` : `${f.w}'×${f.h}'`}

                  <span className="text-xs tv-muted">+</span>

        </div>

        {/* CENTER: Floor plan canvas */}
        <div className="flex-1 overflow-auto scroll-thin bg-[#0a0c10] flex items-start justify-center p-12">

            <div className="text-center mb-2">

            <div className="text-center mt-8 text-xs tv-muted">↑ Main Stage / LED Video Wall · ↓ Audience Entrance</div>

        </div>

                </div>
              </div>
              <div className="flex items-start gap-2">
                <span className="text-emerald-400 mt-0.5">✓</span>
                <div>
                  <div>Loading dock access clear</div>
                  <div className="tv-muted text-[10px]">No items in dock approach</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// INVENTORY
// ============================================================

function Inventory() {
  const categories = [...new Set(INVENTORY.map(i => i.category))];
  const [active, setActive] = useState('All');
  const filtered = active === 'All' ? INVENTORY : INVENTORY.filter(i => i.category === active);

  return (
    <div className="flex-1 flex flex-col overflow-hidden">
      <TopBar
        title="Inventory"
        subtitle="Track what's on the floor, what's in storage, and what's running low."
        right={
          <button className="px-3 py-2 text-sm tv-panel-2 rounded border tv-divider hover:border-[var(--tv-gold)]">
            Order request
          </button>
        }
      />
      <div className="flex-1 overflow-auto scroll-thin p-8 space-y-6">
        <div className="grid grid-cols-4 gap-4">
          <StatCard label="Total Items" value={INVENTORY.reduce((a,i) => a + i.stock, 0)} sub="Across all categories" />
          <StatCard label="Currently Deployed" value={INVENTORY.reduce((a,i) => a + i.deployed, 0)} sub="On floor for live events" accent="tv-gold" />
          <StatCard label="Available" value={INVENTORY.reduce((a,i) => a + (i.stock - i.deployed), 0)} sub="Ready to schedule" accent="text-emerald-400" />
          <StatCard label="Low-Stock Alerts" value="2" sub="Lounge sofas, podiums" accent="text-amber-400" />
        </div>

        <div className="flex items-center gap-2">
          <button onClick={() => setActive('All')} className={classNames(
            "px-3 py-1.5 text-xs rounded-full border",
            active === 'All' ? 'tv-gold-bg border-transparent' : 'tv-panel border-[var(--tv-line)] tv-muted hover:text-white'
          )}>All</button>
          {categories.map(c => (
            <button key={c} onClick={() => setActive(c)} className={classNames(
              "px-3 py-1.5 text-xs rounded-full border",
              active === c ? 'tv-gold-bg border-transparent' : 'tv-panel border-[var(--tv-line)] tv-muted hover:text-white'
            )}>{c}</button>
          ))}
        </div>

        <div className="tv-panel rounded-lg overflow-hidden">
          <table className="w-full text-sm">
            <thead>
              <tr className="text-xs uppercase tracking-wider tv-muted border-b tv-divider">
                <th className="text-left px-5 py-3">Item</th>
                <th className="text-left px-5 py-3">Category</th>
                <th className="text-right px-5 py-3">Stock</th>
                <th className="text-right px-5 py-3">Deployed</th>
                <th className="text-right px-5 py-3">Available</th>
                <th className="text-left px-5 py-3 w-48">Utilization</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(i => {
                const pct = (i.deployed / i.stock) * 100;
                return (
                  <tr key={i.id} className="border-b tv-divider hover:bg-[#1d212d]">
                    <td className="px-5 py-3 font-medium">{i.name}</td>
                    <td className="px-5 py-3 tv-muted">{i.category}</td>
                    <td className="px-5 py-3 text-right">{i.stock}</td>
                    <td className="px-5 py-3 text-right">{i.deployed}</td>
                    <td className="px-5 py-3 text-right font-medium">
                      <span className={i.stock - i.deployed < 5 ? 'text-amber-400' : ''}>{i.stock - i.deployed}</span>
                    </td>
                    <td className="px-5 py-3">
                      <div className="flex items-center gap-3">
                        <div className="flex-1 h-1.5 bg-[#0a0c10] rounded overflow-hidden">
                          <div className={classNames(
                            "h-full",
                            pct > 80 ? 'bg-red-500' : pct > 50 ? 'bg-amber-500' : 'bg-emerald-500'
                          )} style={{ width: `${pct}%` }}></div>
                        </div>
                        <span className="text-xs tv-muted w-10 text-right">{pct.toFixed(0)}%</span>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// REPORTS
// ============================================================

function Reports({ events }) {
  // Utilization by space
  const utilByPreset = {};
  events.forEach(e => {
    utilByPreset[e.preset] = (utilByPreset[e.preset] || 0) + 1;
  });

  const maxPresetCount = Math.max(...Object.values(utilByPreset));

  return (
    <div className="flex-1 flex flex-col overflow-hidden">
      <TopBar
        title="Reports"
        subtitle="Venue utilization, layout patterns, and operational benchmarks."
        right={<button className="px-3 py-2 text-sm tv-panel-2 rounded border tv-divider hover:border-[var(--tv-gold)]">Export CSV</button>}
      />
      <div className="flex-1 overflow-auto scroll-thin p-8 space-y-6">
        <div className="grid grid-cols-3 gap-6">
          <div className="tv-panel rounded-lg p-5">
            <div className="text-xs uppercase tv-muted tracking-wider">Booking velocity</div>
            <div className="text-3xl font-semibold mt-2 tv-gold">+24%</div>
            <div className="text-xs tv-muted mt-1">vs. Q1 2026</div>
            <div className="mt-4 h-12 flex items-end gap-1">
              {[40, 55, 48, 70, 62, 80, 92, 88, 105, 110, 124, 124].map((v, i) => (
                <div key={i} className="flex-1 bg-gradient-to-t from-[var(--tv-gold)] to-amber-300/40 rounded-t" style={{ height: `${v / 1.4}%` }}></div>
              ))}
            </div>
            <div className="text-[10px] tv-muted mt-1 flex justify-between"><span>Jun '25</span><span>May '26</span></div>
          </div>

          <div className="tv-panel rounded-lg p-5">
            <div className="text-xs uppercase tv-muted tracking-wider">Avg. guest count</div>
            <div className="text-3xl font-semibold mt-2">192</div>
            <div className="text-xs tv-muted mt-1">per event, last 30 days</div>
            <div className="mt-4 text-xs space-y-1.5">
              <div className="flex items-center justify-between"><span className="tv-muted">Largest</span><span className="font-medium">320 (NVTC Gala)</span></div>
              <div className="flex items-center justify-between"><span className="tv-muted">Smallest</span><span className="font-medium">64 (Airbus Mtg)</span></div>
              <div className="flex items-center justify-between"><span className="tv-muted">Median</span><span className="font-medium">200</span></div>
            </div>
          </div>

          <div className="tv-panel rounded-lg p-5">
            <div className="text-xs uppercase tv-muted tracking-wider">Space utilization</div>
            <div className="text-3xl font-semibold mt-2">68%</div>
            <div className="text-xs tv-muted mt-1">Space A booked / available days</div>
            <div className="mt-4 space-y-2">
              {['A', 'B', 'C'].map((s, i) => {
                const pct = [78, 41, 28][i];
                return (
                  <div key={s}>
                    <div className="flex justify-between text-xs mb-1">
                      <span className="tv-muted">Space {s}</span>
                      <span>{pct}%</span>
                    </div>
                    <div className="h-1.5 bg-[#0a0c10] rounded overflow-hidden">
                      <div className="h-full bg-[var(--tv-gold)]" style={{ width: `${pct}%` }}></div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>

        <div className="grid grid-cols-2 gap-6">
          <div className="tv-panel rounded-lg p-5">
            <h3 className="font-semibold mb-4">Most-used layouts</h3>
            <div className="space-y-3">
              {Object.entries(utilByPreset).sort((a,b) => b[1] - a[1]).map(([k, v]) => {
                const preset = PRESETS.find(p => p.id === k);
                return (
                  <div key={k}>
                    <div className="flex items-center justify-between text-sm mb-1">
                      <span className="flex items-center gap-2"><span>{preset?.icon}</span><span>{preset?.label}</span></span>
                      <span className="tv-muted">{v} events</span>
                    </div>
                    <div className="h-1.5 bg-[#0a0c10] rounded overflow-hidden">
                      <div className="h-full bg-gradient-to-r from-[var(--tv-gold)] to-amber-300" style={{ width: `${(v / maxPresetCount) * 100}%` }}></div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          <div className="tv-panel rounded-lg p-5">
            <h3 className="font-semibold mb-4">Operational benchmarks</h3>
            <div className="space-y-3 text-sm">
              <div className="flex items-center justify-between py-2 border-b tv-divider">
                <span className="tv-muted">Avg. setup time per event</span>
                <span className="font-medium">4.2 hrs</span>
              </div>
              <div className="flex items-center justify-between py-2 border-b tv-divider">
                <span className="tv-muted">Avg. teardown time</span>
                <span className="font-medium">2.1 hrs</span>
              </div>
              <div className="flex items-center justify-between py-2 border-b tv-divider">
                <span className="tv-muted">AV failure incidents</span>
                <span className="font-medium text-emerald-400">0</span>
              </div>
              <div className="flex items-center justify-between py-2 border-b tv-divider">
                <span className="tv-muted">Client repeat-booking rate</span>
                <span className="font-medium">62%</span>
              </div>
              <div className="flex items-center justify-between py-2">
                <span className="tv-muted">NPS (last 90 days)</span>
                <span className="font-medium tv-gold">+71</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// APP
// ============================================================

function App() {
  const [view, setView] = useState('dashboard');
  const [events] = useState(SAMPLE_EVENTS);
  const [currentEvent, setCurrentEvent] = useState(null);

  const openEvent = (e) => {
    setCurrentEvent(e);
    setView('designer');
  };

  const newEvent = () => {
    setCurrentEvent({ name: 'New Event', client: '', guests: 200, space: 'A', preset: null });
    setView('designer');
  };

  return (
    <div className="flex h-screen overflow-hidden">
      <Sidebar active={view} onNav={(v) => { setView(v); if (v === 'designer' && !currentEvent) setCurrentEvent({ name: 'New Event', client: '', guests: 200, space: 'A', preset: null }); }} />
      <main className="flex-1 flex flex-col overflow-hidden">
        {view === 'dashboard' && <Dashboard events={events} onOpenEvent={openEvent} onNewEvent={newEvent} onNav={setView} />}
        {view === 'designer' && <Designer events={events} currentEvent={currentEvent} />}
        {view === 'events' && <EventsScreen events={events} onOpenEvent={openEvent} onNewEvent={newEvent} />}
        {view === 'inventory' && <Inventory />}
        {view === 'reports' && <Reports events={events} />}
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
