function Designer({ events, currentEvent, onSaveEvent, isMobile, activeProject, onUpdateRoomLayout, onBackToFloorPlan }) {
  const [spaceId, setSpaceId] = useState(currentEvent?.space || 'A');
  const space = getSpace(spaceId);
  const [items, setItems] = useState([]);
  const [selectedId, setSelectedId] = useState(null);
  const [eventName, setEventName] = useState(currentEvent?.name || 'Untitled Event');
  const [eventClient, setEventClient] = useState(currentEvent?.client || '');
  const [eventGuests, setEventGuests] = useState(currentEvent?.guests || 200);
  const [showSaved, setShowSaved] = useState(false);

  // Project mode: this designer session is editing a room of the active project.
  const projectMode = !!(activeProject && currentEvent?.projectId === activeProject.id);
  const skipPersist = useRef(false);

  // Switch the active room when a new room/event is opened (e.g. from the floor plan)
  useEffect(() => {
    if (currentEvent?.space && currentEvent.space !== spaceId) {
      setSpaceId(currentEvent.space);
    }
    // eslint-disable-next-line
  }, [currentEvent]);

  // Initialize layout when event or space changes
  useEffect(() => {
    if (projectMode) {
      // Load this room's saved layout from the active project (may be empty).
      const saved = activeProject.layouts[spaceId] || [];
      skipPersist.current = true;
      setItems(saved.map(it => ({ ...it })));
      setSelectedId(null);
    } else if (currentEvent?.preset) {
      applyPreset(currentEvent.preset);
    } else {
      // entering a non-event room with no preset → start empty
      setItems([]);
      setSelectedId(null);
    }
    // eslint-disable-next-line
  }, [currentEvent?.id, spaceId, projectMode]);

  // Persist edits back to the active project (project mode only).
  useEffect(() => {
    if (!projectMode) return;
    if (skipPersist.current) { skipPersist.current = false; return; }
    onUpdateRoomLayout(spaceId, items);
    // eslint-disable-next-line
  }, [items]);

  const applyPreset = (presetId) => {
    const preset = PRESETS.find(p => p.id === presetId);
    if (!preset) return;
    const placed = preset.fn(space).map(it => ({ ...it, id: uid() }));
    setItems(placed);
    setSelectedId(null);
  };

  const addItem = (furnId) => {
    const f = FURN_BY_ID[furnId];
    const size = f.shape === 'circle' ? f.diameter : Math.max(f.w, f.h);
    const it = {
      id: uid(),
      furnId,
      xFt: space.widthFt / 2 - size / 2,
      yFt: space.depthFt / 2 - size / 2,
    };
    setItems(prev => [...prev, it]);
    setSelectedId(it.id);
  };

  const moveItem = (id, xFt, yFt) => {
    const clamped = (v, max, size) => Math.max(0, Math.min(max - size, v));
    setItems(prev => prev.map(it => {
      if (it.id !== id) return it;
      const f = FURN_BY_ID[it.furnId];
      const swap = it.rotation === 90 || it.rotation === 270;
      const w = f.shape === 'circle' ? f.diameter : (swap ? f.h : f.w);
      const h = f.shape === 'circle' ? f.diameter : (swap ? f.w : f.h);
      return { ...it, xFt: clamped(xFt, space.widthFt, w), yFt: clamped(yFt, space.depthFt, h) };
    }));
  };

  const deleteItem = (id) => {
    setItems(prev => prev.filter(it => it.id !== id));
    setSelectedId(null);
  };

  const rotateItem = (id) => {
    setItems(prev => prev.map(it => it.id === id ? { ...it, rotation: ((it.rotation || 0) + 90) % 360 } : it));
  };

  const duplicateItem = (id) => {
    const orig = items.find(it => it.id === id);
    if (!orig) return;
    const copy = { ...orig, id: uid(), xFt: orig.xFt + 2, yFt: orig.yFt + 2 };
    setItems(prev => [...prev, copy]);
    setSelectedId(copy.id);
  };

  const clearAll = () => {
    if (window.confirm('Clear all items from the floor?')) {
      setItems([]);
      setSelectedId(null);
    }
  };

  // Stats
  const stats = useMemo(() => {
    let chairs = 0, tables = 0, capacity = 0;
    items.forEach(it => {
      const f = FURN_BY_ID[it.furnId];
      if (!f) return;
      if (f.type === 'chair') chairs++;
      else if (f.type === 'table') tables++;
      capacity += f.capacity;
    });
    // Effective seating capacity: count chairs OR seat-capacity from tables, whichever is the design intent.
    // For banquet rounds, capacity is the table's seat count.
    return { chairs, tables, capacity, total: items.length };
  }, [items]);

  const selected = items.find(it => it.id === selectedId);
  const selectedFurn = selected ? FURN_BY_ID[selected.furnId] : null;

  const handleSave = () => {
    setShowSaved(true);
    setTimeout(() => setShowSaved(false), 2000);
  };

  // Mobile bottom-sheet tab state
  const [mobileTab, setMobileTab] = useState(null); // null | 'setup' | 'items' | 'props'
  // When the user selects an item on mobile, auto-open the props sheet so they can edit it.
  useEffect(() => {
    if (isMobile && selectedId) setMobileTab('props');
    // eslint-disable-next-line
  }, [selectedId, isMobile]);

  // Reusable panel contents as render functions
  const renderSetupPanel = () => (
    <div className="flex flex-col">
      <div className="p-4 border-b tv-divider">
        {projectMode && (
          <div className="mb-3 text-[11px] tv-muted">
            Project: <span className="tv-gold font-medium">{activeProject.name}</span>
            <div className="mt-0.5">Editing this room saves to the project. Use <span className="text-white">View Floor Plan</span> to see everything together.</div>
          </div>
        )}
        <div className="text-xs uppercase tv-muted tracking-wider mb-2">{projectMode ? 'Room' : 'Event'}</div>
        <input value={eventName} onChange={e => setEventName(e.target.value)} className="w-full mb-2 text-sm font-medium" />
        <input value={eventClient} onChange={e => setEventClient(e.target.value)} placeholder="Client name" className="w-full mb-2 text-xs" />
        <div className="flex items-center gap-2">
          <select value={spaceId} onChange={e => setSpaceId(e.target.value)} className="flex-1 text-xs">
            {DESIGNABLE_ROOMS.map(r => (
              <option key={r.id} value={r.id}>{r.label}</option>
            ))}
          </select>
          <input type="number" value={eventGuests} onChange={e => setEventGuests(Number(e.target.value))} className="w-20 text-xs" />
        </div>
      </div>
      <div className="p-4">
        <div className="text-xs uppercase tv-muted tracking-wider mb-2">Quick presets</div>
        <div className="grid grid-cols-2 gap-2">
          {PRESETS.map(p => (
            <button key={p.id} onClick={() => applyPreset(p.id)}
              className="tv-panel-2 border tv-divider rounded p-2 text-left hover:border-[var(--tv-gold)]">
              <div className="text-base">{p.icon}</div>
              <div className="text-xs font-medium mt-0.5">{p.label}</div>
              <div className="text-[10px] tv-muted">{p.desc}</div>
            </button>
          ))}
        </div>
      </div>
    </div>
  );

  const renderItemsPanel = () => (
    <div className="p-4">
      <div className="text-xs uppercase tv-muted tracking-wider mb-2">Add furniture</div>
      <div className="space-y-1">
        {FURNITURE_LIBRARY.map(f => (
          <button key={f.id} onClick={() => addItem(f.id)}
            className="w-full flex items-center gap-3 px-2 py-2 rounded hover:bg-[#1d212d] text-left">
            <div className="w-7 h-7 rounded flex items-center justify-center flex-shrink-0"
                 style={{ background: f.color }}>
              {f.shape === 'circle' && <div className="w-5 h-5 rounded-full border border-white/30"></div>}
              {f.shape === 'rect' && <div className="w-5 h-3 border border-white/30 rounded-sm"></div>}
            </div>
            <div className="flex-1 min-w-0">
              <div className="text-xs font-medium truncate">{f.label}</div>
              <div className="text-[10px] tv-muted">
                {f.shape === 'circle' ? `${f.diameter}' dia` : `${f.w}'×${f.h}'`}
                {f.capacity > 0 ? ` · seats ${f.capacity}` : ''}
              </div>
            </div>
            <span className="text-xs tv-muted">+</span>
          </button>
        ))}
      </div>
    </div>
  );

  const renderPropsPanel = () => (
    <div className="flex flex-col">
      <div className="p-5 border-b tv-divider">
        <div className="text-xs uppercase tv-muted tracking-wider mb-3">Capacity</div>
        <div className="grid grid-cols-2 gap-3">
          <div>
            <div className="text-2xl font-semibold tv-gold">{stats.capacity}</div>
            <div className="text-[10px] tv-muted uppercase tracking-wider">Seats</div>
          </div>
          <div>
            <div className="text-2xl font-semibold">{stats.tables}</div>
            <div className="text-[10px] tv-muted uppercase tracking-wider">Tables</div>
          </div>
          <div>
            <div className="text-2xl font-semibold">{stats.chairs}</div>
            <div className="text-[10px] tv-muted uppercase tracking-wider">Chairs</div>
          </div>
          <div>
            <div className="text-2xl font-semibold">{stats.total}</div>
            <div className="text-[10px] tv-muted uppercase tracking-wider">Total items</div>
          </div>
        </div>
        <div className="mt-4 pt-4 border-t tv-divider">
          <div className="flex items-center justify-between text-xs">
            <span className="tv-muted">Guest count target</span>
            <span className="font-medium">{eventGuests}</span>
          </div>
          <div className="mt-2 h-2 bg-[#0a0c10] rounded overflow-hidden">
            <div className={classNames(
              "h-full transition-all",
              stats.capacity >= eventGuests ? "bg-emerald-500" : "bg-amber-500"
            )} style={{ width: `${Math.min(100, (stats.capacity / eventGuests) * 100)}%` }}></div>
          </div>
          <div className="text-[10px] tv-muted mt-1">
            {stats.capacity >= eventGuests
              ? `✓ ${stats.capacity - eventGuests} seats over target`
              : `${eventGuests - stats.capacity} seats short of target`}
          </div>
        </div>
      </div>
      <div className="p-5 border-b tv-divider">
        <div className="text-xs uppercase tv-muted tracking-wider mb-3">Selected item</div>
        {selected && selectedFurn ? (
          <div className="space-y-3">
            <div>
              <div className="font-medium text-sm">{selectedFurn.label}</div>
              <div className="text-xs tv-muted">
                {selectedFurn.shape === 'circle' ? `${selectedFurn.diameter}' diameter` : `${selectedFurn.w}'×${selectedFurn.h}'`}
                {selectedFurn.capacity > 0 ? ` · seats ${selectedFurn.capacity}` : ''}
              </div>
            </div>
            <div className="grid grid-cols-2 gap-2">
              <div>
                <label className="text-[10px] tv-muted uppercase tracking-wider">X (ft)</label>
                <div className="text-sm font-medium">{selected.xFt.toFixed(1)}</div>
              </div>
              <div>
                <label className="text-[10px] tv-muted uppercase tracking-wider">Y (ft)</label>
                <div className="text-sm font-medium">{selected.yFt.toFixed(1)}</div>
              </div>
            </div>
            <div className="flex gap-2">
              {selectedFurn.shape === 'rect' && (
                <button onClick={() => rotateItem(selected.id)} className="flex-1 px-2 py-1.5 text-xs tv-panel-2 border tv-divider rounded hover:border-[var(--tv-gold)]">⟳ Rotate</button>
              )}
              <button onClick={() => duplicateItem(selected.id)} className="flex-1 px-2 py-1.5 text-xs tv-panel-2 border tv-divider rounded hover:border-[var(--tv-gold)]">⎘ Duplicate</button>
              <button onClick={() => deleteItem(selected.id)} className="flex-1 px-2 py-1.5 text-xs rounded tv-red-bg">✕ Delete</button>
            </div>
          </div>
        ) : (
          <div className="text-xs tv-muted">Tap an item on the floor to edit, rotate, or duplicate it.</div>
        )}
      </div>
      <div className="p-5">
        <div className="text-xs uppercase tv-muted tracking-wider mb-3">Compliance check</div>
        <div className="space-y-2 text-xs">
          <div className="flex items-start gap-2">
            <span className="text-emerald-400 mt-0.5">✓</span>
            <div>
              <div>Aisle clearance ≥ 4 ft</div>
              <div className="tv-muted text-[10px]">Confirmed for preset layouts</div>
            </div>
          </div>
          <div className="flex items-start gap-2">
            <span className="text-emerald-400 mt-0.5">✓</span>
            <div>
              <div>Stage sightlines unobstructed</div>
              <div className="tv-muted text-[10px]">All chairs face stage zone</div>
            </div>
          </div>
          <div className="flex items-start gap-2">
            <span className={stats.capacity >= eventGuests ? "text-emerald-400 mt-0.5" : "text-amber-400 mt-0.5"}>
              {stats.capacity >= eventGuests ? '✓' : '!'}
            </span>
            <div>
              <div>Guest capacity target</div>
              <div className="tv-muted text-[10px]">{stats.capacity} / {eventGuests}</div>
            </div>
          </div>
          <div className="flex items-start gap-2">
            <span className="text-emerald-400 mt-0.5">✓</span>
            <div>
              <div>Loading dock access clear</div>
              <div className="tv-muted text-[10px]">No items in dock approach</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );

  // Floor canvas + footer label
  const floorCanvas = (
    <div className="flex-1 flex flex-col bg-[#0a0c10] overflow-hidden">
      <div className="flex-1 relative min-h-0">
        <FloorPlanCanvas
          space={space}
          items={items}
          onMove={moveItem}
          onSelect={setSelectedId}
          selectedId={selectedId}
          onDeselect={() => setSelectedId(null)}
          isMobile={isMobile}
        />
      </div>
      {!isMobile && (
        <div className="text-center py-2 text-xs tv-muted border-t tv-divider flex-shrink-0">
          ↑ Main Stage / LED Video Wall · ↓ Audience Entrance · 3D View — drag to orbit, scroll to zoom
        </div>
      )}
    </div>
  );

  // ====== MOBILE LAYOUT ======
  if (isMobile) {
    const TAB_LABELS = { setup: 'Setup', items: 'Items', props: 'Props' };
    const sheetContent = mobileTab === 'setup' ? renderSetupPanel()
      : mobileTab === 'items' ? renderItemsPanel()
      : mobileTab === 'props' ? renderPropsPanel()
      : null;
    return (
      <div className="flex-1 flex flex-col overflow-hidden">
        {/* Compact action bar */}
        <div className="flex items-center gap-2 px-3 py-2 border-b tv-divider flex-shrink-0 overflow-x-auto">
          {projectMode && onBackToFloorPlan && (
            <button onClick={onBackToFloorPlan} className="px-2.5 py-1.5 text-xs rounded border tv-divider tv-panel-2 flex-shrink-0">⌂ Floor Plan</button>
          )}
          <button onClick={clearAll} className="px-2.5 py-1.5 text-xs rounded border tv-divider tv-panel-2 flex-shrink-0">Clear</button>
          <button className="px-2.5 py-1.5 text-xs rounded border tv-divider tv-panel-2 flex-shrink-0">Export PDF</button>
          <button onClick={handleSave} className="px-3 py-1.5 text-xs tv-gold-bg font-medium rounded flex-shrink-0 ml-auto">
            {showSaved ? '✓ Saved' : 'Save'}
          </button>
        </div>

        {/* 3D scene always full-bleed */}
        <div className="flex-1 relative flex flex-col overflow-hidden min-h-0">
          {floorCanvas}
        </div>

        {/* Bottom tab bar */}
        <div className="flex border-t tv-divider tv-panel flex-shrink-0 safe-bottom">
          {['setup', 'items', 'props'].map(t => (
            <button
              key={t}
              onClick={() => setMobileTab(mobileTab === t ? null : t)}
              className={classNames(
                "flex-1 py-3 text-xs font-medium border-r tv-divider last:border-r-0",
                mobileTab === t ? "tv-gold bg-[#1d212d]" : "tv-muted"
              )}
            >
              {TAB_LABELS[t]}
            </button>
          ))}
        </div>

        {/* Slide-up sheet */}
        {mobileTab && (
          <div className="fixed inset-0 z-30 flex flex-col">
            <div className="backdrop flex-1" onClick={() => setMobileTab(null)} />

              <div className="flex items-center justify-between px-4 py-3 border-b tv-divider flex-shrink-0">
                <div className="text-sm font-semibold">{TAB_LABELS[mobileTab]}</div>
                <button onClick={() => setMobileTab(null)} aria-label="Close" className="w-8 h-8 rounded tv-panel-2 border tv-divider flex items-center justify-center text-base">✕</button>
              </div>
              <div className="flex-1 overflow-auto scroll-thin safe-bottom">
                {sheetContent}
              </div>
            </div>

        )}
      </div>
    );
  }

  // ====== DESKTOP LAYOUT (unchanged 3-column) ======
  return (
    <div className="flex-1 flex flex-col overflow-hidden">
      <TopBar
        title="Layout Designer"
        subtitle="Drag furniture onto the floor or apply a preset to start."
        right={
          <>
            {projectMode && onBackToFloorPlan && (
              <button onClick={onBackToFloorPlan} className="px-3 py-2 text-sm rounded border tv-divider tv-panel-2 hover:border-[var(--tv-gold)]">⌂ View Floor Plan</button>

            <button onClick={handleSave} className="px-4 py-2 text-sm tv-gold-bg font-medium rounded">
              {showSaved ? '✓ Saved' : 'Save Layout'}
            </button>
          </>
        }
      />

      <div className="flex-1 flex overflow-hidden">
        {/* LEFT: Furniture library + Event info */}
        <div className="w-72 tv-panel border-r tv-divider flex flex-col flex-shrink-0 overflow-y-auto scroll-thin">
          {renderSetupPanel()}
          <div className="border-t tv-divider">
            {renderItemsPanel()}
          </div>
        </div>

        {/* CENTER: 3D Floor plan canvas */}
        {floorCanvas}

        {/* RIGHT: Stats + selected item editor */}
        <div className="w-72 tv-panel border-l tv-divider flex flex-col flex-shrink-0 overflow-y-auto scroll-thin">
          {renderPropsPanel()}
        </div>
      </div>
    </div>
  );
}

// ============================================================
// APP
// ============================================================

function App() {
  const [view, setView] = useState('dashboard');
  const [events] = useState(SAMPLE_EVENTS);
  const [currentEvent, setCurrentEvent] = useState(null);
  const [drawerOpen, setDrawerOpen] = useState(false);
  const isMobile = useIsMobile();

  // ---- Whole-building projects (persisted) ----
  const [projects, setProjects] = useState(loadProjects);
  const [activeProjectId, setActiveProjectId] = useState(loadActiveProjectId);
  useEffect(() => { persistProjects(projects); }, [projects]);
  useEffect(() => { persistActiveProjectId(activeProjectId); }, [activeProjectId]);
  const activeProject = projects.find(p => p.id === activeProjectId) || null;

  const createProject = (name) => {
    const p = { id: 'proj-' + Date.now(), name: name || 'Untitled Project', createdAt: Date.now(), updatedAt: Date.now(), layouts: {} };
    setProjects(prev => [...prev, p]);
    setActiveProjectId(p.id);
    return p;
  };
  const deleteProject = (id) => {
    setProjects(prev => prev.filter(p => p.id !== id));
    setActiveProjectId(prev => (prev === id ? null : prev));
  };
  const renameProject = (id, name) => {
    setProjects(prev => prev.map(p => p.id === id ? { ...p, name, updatedAt: Date.now() } : p));
  };
  const updateRoomLayout = (roomId, layoutItems) => {
    setProjects(prev => prev.map(p => p.id === activeProjectId
      ? { ...p, updatedAt: Date.now(), layouts: { ...p.layouts, [roomId]: layoutItems } }
      : p));
  };

  const openEvent = (e) => {
    setCurrentEvent(e);
    setView('designer');
  };

  const newEvent = () => {
    setCurrentEvent({ name: 'New Event', client: '', guests: 200, space: 'A', preset: null });
    setView('designer');
  };

  const handleNav = (v) => {
    setView(v);
    if (v === 'designer' && !currentEvent) {
      setCurrentEvent({ name: 'New Event', client: '', guests: 200, space: 'A', preset: null });
    }
  };

  // Open a room for design from the floor plan — always inside the active project
  // (auto-create one if none exists so placed furniture is saved & shown on the plan).
  const openSpace = (spaceId) => {
    let proj = activeProject;
    if (!proj) proj = createProject('My Event');
    setCurrentEvent({ name: proj.name, client: '', guests: 200, space: spaceId, preset: null, projectId: proj.id });
    setView('designer');
  };

  const VIEW_LABELS = {
    dashboard: 'Dashboard',
    floorplan: 'Floor Plan',
    designer: 'Layout Designer',
    events: 'Events',
    inventory: 'Inventory',
    reports: 'Reports',
  };

  return (
    <div className="flex h-screen overflow-hidden">
      {/* Desktop: persistent sidebar */}
      {!isMobile && <Sidebar active={view} onNav={handleNav} isMobile={false} />}

      {/* Mobile: slide-over drawer */}
      {isMobile && drawerOpen && (
        <div className="fixed inset-0 z-40 flex">
          <div className="backdrop absolute inset-0" onClick={() => setDrawerOpen(false)} />
          <div className="relative z-50 drawer-shown" style={{ animation: 'none' }}>
            <Sidebar active={view} onNav={handleNav} isMobile={true} onClose={() => setDrawerOpen(false)} />
          </div>
        </div>
      )}

      <main className="flex-1 flex flex-col overflow-hidden min-w-0">
        {isMobile && (
          <MobileTopBar
            onMenu={() => setDrawerOpen(true)}
            title={VIEW_LABELS[view]}
          />
        )}
        <div className="flex-1 flex flex-col overflow-hidden min-h-0">
          {view === 'dashboard' && <Dashboard events={events} onOpenEvent={openEvent} onNewEvent={newEvent} onNav={setView} isMobile={isMobile} />}
          {view === 'floorplan' && (
            <FloorPlanScreen
              isMobile={isMobile}
              onOpenSpace={openSpace}
              projects={projects}
              activeProject={activeProject}
              onCreateProject={createProject}
              onSelectProject={setActiveProjectId}
              onRenameProject={renameProject}
              onDeleteProject={deleteProject}
            />
          )}
          {view === 'designer' && (
            <Designer
              events={events}
              currentEvent={currentEvent}
              isMobile={isMobile}
              activeProject={activeProject}
              onUpdateRoomLayout={updateRoomLayout}
              onBackToFloorPlan={() => setView('floorplan')}
            />
          )}
          {view === 'events' && <EventsScreen events={events} onOpenEvent={openEvent} onNewEvent={newEvent} isMobile={isMobile} />}
          {view === 'inventory' && <Inventory isMobile={isMobile} />}
          {view === 'reports' && <Reports events={events} isMobile={isMobile} />}
        </div>
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
