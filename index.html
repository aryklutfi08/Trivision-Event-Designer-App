// ============================================================
// PRESET LAYOUTS — return array of {furnId, xFt, yFt, rotation}
// ============================================================

function presetTheatre(space) {
  const items = [];
  const startY = 16; // below stage
  const endY = space.depthFt - 4;
  const chairSpacing = 2; // ft
  const rowSpacing = 3;
  const aisleWidth = 4;
  const halfWidth = (space.widthFt - aisleWidth) / 2;
  const seatsPerHalf = Math.floor(halfWidth / chairSpacing);
  const startXLeft = (space.widthFt - aisleWidth) / 2 - seatsPerHalf * chairSpacing + 1;
  const startXRight = (space.widthFt + aisleWidth) / 2 + 1;
  for (let y = startY; y <= endY - rowSpacing; y += rowSpacing) {
    for (let i = 0; i < seatsPerHalf; i++) {
      items.push({ furnId: 'theatre-chair', xFt: startXLeft + i * chairSpacing, yFt: y });
      items.push({ furnId: 'theatre-chair', xFt: startXRight + i * chairSpacing, yFt: y });
    }
  }
  return items;
}

function presetBanquet(space) {
  const items = [];
  const tableSize = 6; // diameter
  const tableSpacingX = 9;
  const tableSpacingY = 9;
  const startY = 18;
  const endY = space.depthFt - 6;
  const cols = Math.floor((space.widthFt - 6) / tableSpacingX);
  const offsetX = (space.widthFt - (cols - 1) * tableSpacingX) / 2 - tableSize / 2;
  for (let y = startY; y <= endY - tableSpacingY; y += tableSpacingY) {
    for (let c = 0; c < cols; c++) {
      const tx = offsetX + c * tableSpacingX;
      items.push({ furnId: 'round-72', xFt: tx, yFt: y });
      // 10 chairs around each table
      const cx = tx + tableSize / 2;
      const cy = y + tableSize / 2;
      const r = tableSize / 2 + 1;
      for (let k = 0; k < 10; k++) {
        const a = (k / 10) * Math.PI * 2;
        // Chair's "front" should point toward the table center (cx, cy).
        // rotation=0 means facing -z (north / "up" in top-down). The radial
        // direction from table center is (cos a, sin a), so the chair's
        // back is on that vector. Convert that angle to our rotation
        // convention: rotation_deg = (k * 36 - 90), normalized to [0, 360).
        const rotation = ((k * 36 - 90) % 360 + 360) % 360;
        items.push({
          furnId: 'banquet-chair',
          xFt: cx + Math.cos(a) * r - 0.75,
          yFt: cy + Math.sin(a) * r - 0.75,
          rotation,
        });
      }
    }
  }
  return items;
}

function presetClassroom(space) {
  const items = [];
  const startY = 16;
  const endY = space.depthFt - 4;
  const rowSpacing = 5;
  const tableW = 6;
  const tablesPerRow = Math.floor((space.widthFt - 4) / (tableW + 1));
  const offsetX = (space.widthFt - (tablesPerRow * (tableW + 1) - 1)) / 2;
  for (let y = startY; y <= endY - rowSpacing; y += rowSpacing) {
    for (let i = 0; i < tablesPerRow; i++) {
      const tx = offsetX + i * (tableW + 1);
      items.push({ furnId: 'rect-6', xFt: tx, yFt: y });
      // 3 chairs on the audience side (facing stage = facing up)
      items.push({ furnId: 'banquet-chair', xFt: tx + 0.5, yFt: y + 2.7 });
      items.push({ furnId: 'banquet-chair', xFt: tx + 2.25, yFt: y + 2.7 });
      items.push({ furnId: 'banquet-chair', xFt: tx + 4, yFt: y + 2.7 });
    }
  }
  return items;
}

function presetUShape(space) {
  const items = [];
  const startY = 18;
  const endY = space.depthFt - 12;
  const sideX1 = space.widthFt / 2 - 8;
  const sideX2 = space.widthFt / 2 + 5;
  // Top of U (closest to stage) — horizontal tables. Chairs sit north of
  // the table and should face SOUTH (down toward the table) → rotation 180.
  for (let i = 0; i < 3; i++) {
    items.push({ furnId: 'rect-6', xFt: sideX1 + i * 6, yFt: startY });
    items.push({ furnId: 'banquet-chair', xFt: sideX1 + 0.5 + i * 6, yFt: startY - 2, rotation: 180 });
    items.push({ furnId: 'banquet-chair', xFt: sideX1 + 2.25 + i * 6, yFt: startY - 2, rotation: 180 });
    items.push({ furnId: 'banquet-chair', xFt: sideX1 + 4 + i * 6, yFt: startY - 2, rotation: 180 });
  }
  // Left side of U — vertical tables. Chairs sit west of the table and
  // should face EAST (right) toward the table → rotation 90.
  for (let y = startY + 4; y < endY; y += 6) {
    items.push({ furnId: 'rect-6', xFt: sideX1, yFt: y, rotation: 90 });
    items.push({ furnId: 'banquet-chair', xFt: sideX1 - 2, yFt: y + 0.5, rotation: 90 });
    items.push({ furnId: 'banquet-chair', xFt: sideX1 - 2, yFt: y + 2.25, rotation: 90 });
    items.push({ furnId: 'banquet-chair', xFt: sideX1 - 2, yFt: y + 4, rotation: 90 });
  }
  // Right side of U — chairs sit east of the table and should face WEST
  // (left) toward the table → rotation 270.
  for (let y = startY + 4; y < endY; y += 6) {
    items.push({ furnId: 'rect-6', xFt: sideX2 + 2.5, yFt: y, rotation: 90 });
    items.push({ furnId: 'banquet-chair', xFt: sideX2 + 5, yFt: y + 0.5, rotation: 270 });
    items.push({ furnId: 'banquet-chair', xFt: sideX2 + 5, yFt: y + 2.25, rotation: 270 });
    items.push({ furnId: 'banquet-chair', xFt: sideX2 + 5, yFt: y + 4, rotation: 270 });
  }
  return items;
}

function presetBoardroom(space) {
  const items = [];
  const cy = space.depthFt / 2 + 4;
  const cx = space.widthFt / 2;
  // 3 rectangular tables in a row to make a long boardroom table
  for (let i = -1; i <= 1; i++) {
    items.push({ furnId: 'rect-8', xFt: cx - 4, yFt: cy + i * 2.5 - 1.25 });
  }
  // Chairs around long sides. North-side chairs (yFt < table) face SOUTH
  // (rotation 180); south-side chairs face NORTH (rotation 0, default).
  for (let i = 0; i < 6; i++) {
    items.push({ furnId: 'banquet-chair', xFt: cx - 4 + i * 1.4, yFt: cy - 5.5, rotation: 180 });
    items.push({ furnId: 'banquet-chair', xFt: cx - 4 + i * 1.4, yFt: cy + 4, rotation: 0 });
  }
  // Chairs at the ends — west end faces EAST (90), east end faces WEST (270).
  items.push({ furnId: 'banquet-chair', xFt: cx - 5.5, yFt: cy - 0.75, rotation: 90 });
  items.push({ furnId: 'banquet-chair', xFt: cx + 4.5, yFt: cy - 0.75, rotation: 270 });
  return items;
}

function presetReception(space) {
  const items = [];
  const cols = Math.floor(space.widthFt / 8);
  const rows = Math.floor((space.depthFt - 14) / 8);
  const offsetX = (space.widthFt - cols * 8) / 2 + 4;
  const offsetY = 16;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      // Stagger
      const ox = (r % 2 === 0) ? 0 : 4;
      const x = offsetX + c * 8 + ox - 1.25;
      const y = offsetY + r * 8 - 1.25;
      if (x < space.widthFt - 3 && y < space.depthFt - 4) {
        items.push({ furnId: 'cocktail', xFt: x, yFt: y });
      }
    }
  }
  return items;
}

function Dashboard({ events, onOpenEvent, onNewEvent, onNav }) {
  const upcoming = events.filter(e => new Date(e.date) >= new Date('2026-05-15')).sort((a,b) => a.date.localeCompare(b.date));

        title="Welcome back, Arya"

              Today's run sheet

            <button onClick={onNewEvent} className="px-4 py-2 text-sm tv-gold-bg font-medium rounded">

function hexToInt(c) {
  return parseInt(c.replace('#', ''), 16);
}

function updateOrbitCamera(camera, orbit) {
  const x = orbit.distance * Math.sin(orbit.polar) * Math.cos(orbit.azimuth);
  const y = orbit.distance * Math.cos(orbit.polar);
  const z = orbit.distance * Math.sin(orbit.polar) * Math.sin(orbit.azimuth);
  camera.position.set(
    orbit.target.x + x,
    orbit.target.y + y,
    orbit.target.z + z
  );
  camera.lookAt(orbit.target);
}

function buildFurnitureMesh(item, f, isSelected) {
  const group = new THREE.Group();
  group.userData.itemId = item.id;
  group.userData.isItem = true;

  const baseColor = hexToInt(f.color);
  const makeMat = (overrides = {}) =>
    new THREE.MeshStandardMaterial(Object.assign(
      { color: baseColor, roughness: 0.65, metalness: 0.1 },
      isSelected ? { emissive: 0xc8a96a, emissiveIntensity: 0.45 } : {},
      overrides
    ));

  // Geometry is always built in its natural orientation; visible rotation is
  // applied at the end via group.rotation.y so chairs, tables, and lounges all
  // physically spin around their own center.
  if (f.type === 'chair') {
    // Seat
    const seat = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.18, 1.3), makeMat());
    seat.position.y = 1.4;
    seat.castShadow = true;
    seat.receiveShadow = true;
    group.add(seat);
    // Back — placed on +z side so chair "faces" -z (toward stage in our coord system)
    const back = new THREE.Mesh(new THREE.BoxGeometry(1.3, 1.8, 0.18), makeMat());
    back.position.set(0, 2.3, 0.56);
    back.castShadow = true;
    group.add(back);
    // 4 legs
    for (let i = -1; i <= 1; i += 2) {
      for (let j = -1; j <= 1; j += 2) {
        const leg = new THREE.Mesh(new THREE.BoxGeometry(0.12, 1.4, 0.12), makeMat({ color: 0x2a2f3d }));
        leg.position.set(i * 0.55, 0.7, j * 0.55);
        leg.castShadow = true;
        group.add(leg);
      }
    }
  } else if (f.type === 'table' && f.shape === 'circle') {
    const r = f.diameter / 2;
    const tableMat = makeMat({ color: 0xffffff, roughness: 0.3 });
    const top = new THREE.Mesh(new THREE.CylinderGeometry(r, r, 0.18, 36), tableMat);
    top.position.y = 2.5;
    top.castShadow = true;
    top.receiveShadow = true;
    group.add(top);
    // Linen drape — slightly larger, semi-transparent
    const drape = new THREE.Mesh(
      new THREE.CylinderGeometry(r, r, 2.4, 36, 1, true),
      new THREE.MeshStandardMaterial({ color: 0xf5f1ea, side: THREE.DoubleSide, roughness: 0.9 })
    );
    drape.position.y = 1.2;
    group.add(drape);
    // Pedestal
    const pedestal = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.25, 2.4, 16), makeMat({ color: 0x2a2f3d }));
    pedestal.position.y = 1.2;
    group.add(pedestal);
    // Base
    const base = new THREE.Mesh(new THREE.CylinderGeometry(r * 0.4, r * 0.45, 0.12, 24), makeMat({ color: 0x2a2f3d }));
    base.position.y = 0.06;
    base.receiveShadow = true;
    group.add(base);
    // Cocktail table tweak — taller and thinner
    if (f.id === 'cocktail') {
      top.position.y = 3.6;
      drape.position.y = 1.8;
      drape.geometry.dispose();
      drape.geometry = new THREE.CylinderGeometry(r, r * 0.7, 3.6, 24, 1, true);
      pedestal.position.y = 1.8;
      pedestal.geometry.dispose();
      pedestal.geometry = new THREE.CylinderGeometry(0.2, 0.2, 3.6, 16);
    }
  } else if (f.type === 'table' && f.shape === 'rect') {
    const w = f.w;
    const d = f.h;
    const top = new THREE.Mesh(new THREE.BoxGeometry(w, 0.18, d), makeMat({ color: 0xeae4d6, roughness: 0.4 }));
    top.position.y = 2.5;
    top.castShadow = true;
    top.receiveShadow = true;
    group.add(top);
    // Legs at corners
    const legMat = makeMat({ color: 0x2a2f3d });
    for (let i = -1; i <= 1; i += 2) {
      for (let j = -1; j <= 1; j += 2) {
        const leg = new THREE.Mesh(new THREE.BoxGeometry(0.18, 2.4, 0.18), legMat);
        leg.position.set(i * (w / 2 - 0.15), 1.2, j * (d / 2 - 0.15));
        leg.castShadow = true;
        group.add(leg);
      }
    }
  } else if (f.type === 'lounge') {
    const w = f.w;
    const d = f.h;
    const cushMat = makeMat({ roughness: 0.85 });
    // Base
    const base = new THREE.Mesh(new THREE.BoxGeometry(w, 1.3, d), cushMat);
    base.position.y = 0.65;
    base.castShadow = true;
    base.receiveShadow = true;
    group.add(base);
    // Back
    const back = new THREE.Mesh(new THREE.BoxGeometry(w, 1.6, 0.5), cushMat);
    back.position.set(0, 1.9, d / 2 - 0.25);
    back.castShadow = true;
    group.add(back);
    // Arms
    const armL = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.0, d), cushMat);
    armL.position.set(-w / 2 + 0.2, 1.8, 0);
    group.add(armL);
    const armR = armL.clone();
    armR.position.x = w / 2 - 0.2;
    group.add(armR);
  } else if (f.id === 'podium') {
    const w = f.w;
    const d = f.h;
    const body = new THREE.Mesh(
      new THREE.BoxGeometry(w, 4, d),
      makeMat({ color: 0xc8a96a, roughness: 0.3, metalness: 0.55 })
    );
    body.position.y = 2;
    body.castShadow = true;
    body.receiveShadow = true;
    group.add(body);
    // Angled top reading surface
    const slope = new THREE.Mesh(
      new THREE.BoxGeometry(w * 0.95, 0.1, d * 0.7),
      makeMat({ color: 0x6b4f2a })
    );
    slope.position.set(0, 4.1, 0.15);
    slope.rotation.x = -0.25;
    group.add(slope);
  } else if (f.id === 'stage-deck') {
    const w = f.w;
    const d = f.h;
    const deck = new THREE.Mesh(new THREE.BoxGeometry(w, 1.5, d), makeMat({ color: 0x1c1419 }));
    deck.position.y = 0.75;
    deck.castShadow = true;
    deck.receiveShadow = true;
    group.add(deck);
    const trim = new THREE.Mesh(
      new THREE.BoxGeometry(w + 0.05, 0.1, d + 0.05),
      makeMat({ color: 0xc8a96a, metalness: 0.6, roughness: 0.3 })
    );
    trim.position.y = 1.5;
    group.add(trim);
  } else {
    const w = f.w || 1;
    const d = f.h || 1;
    const box = new THREE.Mesh(new THREE.BoxGeometry(w, 2, d), makeMat());
    box.position.y = 1;
    box.castShadow = true;
    group.add(box);
  }

  // Apply visible rotation so chairs / tables / lounges spin around their center.
  // Negative so rotation === 90 matches a clockwise 2D rotation when viewed from above.
  if (item.rotation) {
    group.rotation.y = -((item.rotation || 0) * Math.PI) / 180;
  }

  return group;
}

function disposeGroup(group) {
  group.traverse(obj => {
    if (obj.geometry) obj.geometry.dispose();
    if (obj.material) {
      if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
      else obj.material.dispose();
    }
  });
}

function FloorPlanCanvas({ space, items, onMove, onSelect, selectedId, onDeselect }) {
  const containerRef = useRef(null);
  const stateRef = useRef({
    scene: null,
    camera: null,
    renderer: null,
    floor: null,
    itemGroup: null,
    raycaster: null,
    mouse: null,
    orbit: { azimuth: Math.PI / 2 + 0.4, polar: Math.PI / 3.2, distance: 90, target: new THREE.Vector3(0, 0, 0) },
    dragging: null,
    orbiting: null,
    animId: null,
    spaceMeta: null,
    callbacks: {},
    itemsCache: [],
  });

  // Keep latest callbacks/items inside stateRef so listeners stay valid
  stateRef.current.callbacks = { onMove, onSelect, onDeselect };
  stateRef.current.itemsCache = items;

  // Build scene whenever the space (room) changes
  useEffect(() => {
    const container = containerRef.current;
    if (!container) return;

    const width = container.clientWidth || 800;
    const height = container.clientHeight || 600;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0c10);
    scene.fog = new THREE.Fog(0x0a0c10, 80, 260);

    const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 600);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(width, height);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputEncoding = THREE.sRGBEncoding;
    container.appendChild(renderer.domElement);
    renderer.domElement.style.display = 'block';
    renderer.domElement.style.borderRadius = '6px';

    // Lights
    const ambient = new THREE.AmbientLight(0xffffff, 0.35);
    scene.add(ambient);

    const keyLight = new THREE.DirectionalLight(0xfff1d6, 0.85);
    keyLight.position.set(space.widthFt * 0.4, 60, space.depthFt * 0.4);
    keyLight.castShadow = true;
    keyLight.shadow.mapSize.set(2048, 2048);
    const shadowRange = Math.max(space.widthFt, space.depthFt);
    keyLight.shadow.camera.left = -shadowRange;
    keyLight.shadow.camera.right = shadowRange;
    keyLight.shadow.camera.top = shadowRange;
    keyLight.shadow.camera.bottom = -shadowRange;
    keyLight.shadow.camera.near = 1;
    keyLight.shadow.camera.far = 200;
    scene.add(keyLight);

    const fill = new THREE.HemisphereLight(0xc8a96a, 0x0a0c10, 0.4);
    scene.add(fill);

    // Floor
    const floorGeo = new THREE.PlaneGeometry(space.widthFt, space.depthFt);
    const floorMat = new THREE.MeshStandardMaterial({
      color: 0x14171f,
      roughness: 0.85,
      metalness: 0.05,
    });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    floor.userData.isFloor = true;
    scene.add(floor);

    // Floor grid overlay
    const gridSize = Math.max(space.widthFt, space.depthFt);
    const grid = new THREE.GridHelper(gridSize, gridSize, 0x2a2f3d, 0x1d212d);
    grid.material.opacity = 0.5;
    grid.material.transparent = true;
    grid.position.y = 0.02;
    scene.add(grid);

    // Walls — 4 open planes only, no ceiling, so we can fly the camera overhead.
    const wallHeight = 14;
    const wallMat = new THREE.MeshStandardMaterial({
      color: 0x161922,
      roughness: 0.95,
      side: THREE.DoubleSide,
    });
    // North wall (negative z, behind the stage)
    const wallN = new THREE.Mesh(
      new THREE.PlaneGeometry(space.widthFt, wallHeight),
      wallMat
    );
    wallN.position.set(0, wallHeight / 2, -space.depthFt / 2);
    scene.add(wallN);
    // South wall (positive z)
    const wallS = new THREE.Mesh(
      new THREE.PlaneGeometry(space.widthFt, wallHeight),
      wallMat
    );
    wallS.position.set(0, wallHeight / 2, space.depthFt / 2);
    wallS.rotation.y = Math.PI;
    scene.add(wallS);
    // East wall (positive x)
    const wallE = new THREE.Mesh(
      new THREE.PlaneGeometry(space.depthFt, wallHeight),
      wallMat
    );
    wallE.position.set(space.widthFt / 2, wallHeight / 2, 0);
    wallE.rotation.y = -Math.PI / 2;
    scene.add(wallE);
    // West wall (negative x)
    const wallW = new THREE.Mesh(
      new THREE.PlaneGeometry(space.depthFt, wallHeight),
      wallMat
    );
    wallW.position.set(-space.widthFt / 2, wallHeight / 2, 0);
    wallW.rotation.y = Math.PI / 2;
    scene.add(wallW);

    // Fixtures (stage, doors)
    space.fixtures.forEach(f => {
      const cx = f.x + f.w / 2 - space.widthFt / 2;
      const cz = f.y + f.h / 2 - space.depthFt / 2;
      if (f.type === 'stage') {
        // Stage platform
        const stageMat = new THREE.MeshStandardMaterial({ color: 0x1c1419, roughness: 0.6, metalness: 0.2 });
        const platform = new THREE.Mesh(new THREE.BoxGeometry(f.w, 1.5, f.h), stageMat);
        platform.position.set(cx, 0.75, cz);
        platform.castShadow = true;
        platform.receiveShadow = true;
        scene.add(platform);

        // Stage gold trim
        const stageTrim = new THREE.Mesh(
          new THREE.BoxGeometry(f.w + 0.1, 0.08, f.h + 0.1),
          new THREE.MeshStandardMaterial({ color: 0xc8a96a, metalness: 0.7, roughness: 0.25 })
        );
        stageTrim.position.set(cx, 1.5, cz);
        scene.add(stageTrim);

        // LED video wall against back of stage
        const ledWidth = f.w;
        const ledHeight = 9;
        const led = new THREE.Mesh(
          new THREE.BoxGeometry(ledWidth, ledHeight, 0.4),
          new THREE.MeshStandardMaterial({
            color: 0x2a1218,
            emissive: 0xb3253b,
            emissiveIntensity: 0.5,
            roughness: 0.4,
          })
        );
        const ledZ = f.y - space.depthFt / 2 + 0.2;
        led.position.set(cx, ledHeight / 2 + 1.5, ledZ);
        scene.add(led);

        // Screen glow (subtle plane in front of LED)
        const glow = new THREE.Mesh(
          new THREE.PlaneGeometry(ledWidth - 0.4, ledHeight - 0.8),
          new THREE.MeshBasicMaterial({ color: 0xff6a85, transparent: true, opacity: 0.25 })
        );
        glow.position.set(cx, ledHeight / 2 + 1.5, ledZ + 0.21);
        scene.add(glow);
      } else if (f.type === 'door') {
        // Door marker on floor
        const doorMarker = new THREE.Mesh(
          new THREE.PlaneGeometry(Math.max(f.w, 1.5), Math.max(f.h, 1.5)),
          new THREE.MeshStandardMaterial({
            color: 0x4ea36c,
            emissive: 0x4ea36c,
            emissiveIntensity: 0.4,
            transparent: true,
            opacity: 0.55,
          })
        );
        doorMarker.rotation.x = -Math.PI / 2;
        doorMarker.position.set(cx, 0.05, cz);
        scene.add(doorMarker);

        // Door frame on wall
        const isVertical = f.w < f.h;
        const frameW = isVertical ? 0.3 : f.w;
        const frameD = isVertical ? f.h : 0.3;
        const frame = new THREE.Mesh(
          new THREE.BoxGeometry(frameW, 7, frameD),
          new THREE.MeshStandardMaterial({ color: 0x4ea36c, emissive: 0x224a30, emissiveIntensity: 0.5 })
        );
        frame.position.set(cx, 3.5, cz);
        scene.add(frame);
      }
    });

    // Item group (added/removed when items change)
    const itemGroup = new THREE.Group();
    scene.add(itemGroup);

    // Initial camera
    const orbit = stateRef.current.orbit;
    orbit.distance = Math.max(space.widthFt, space.depthFt) * 1.25;
    orbit.target.set(0, 2, 0);
    updateOrbitCamera(camera, orbit);

    // Raycaster
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    Object.assign(stateRef.current, { scene, camera, renderer, floor, itemGroup, raycaster, mouse });

    // ----- Event handling -----
    const dom = renderer.domElement;

    const getNDC = (e) => {
      const rect = dom.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    };

    const findItemHit = () => {
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(itemGroup.children, true);
      for (const hit of hits) {
        let obj = hit.object;
        while (obj && !obj.userData.isItem) obj = obj.parent;
        if (obj) return obj.userData.itemId;
      }
      return null;
    };

    const onMouseDown = (e) => {
      getNDC(e);
      if (e.button === 2) {
        stateRef.current.orbiting = { x: e.clientX, y: e.clientY };
        return;
      }
      const id = findItemHit();
      if (id) {
        stateRef.current.callbacks.onSelect(id);
        stateRef.current.dragging = { id };
        e.preventDefault();
        return;
      }
      // Empty click → orbit + deselect
      stateRef.current.orbiting = { x: e.clientX, y: e.clientY };
      stateRef.current.callbacks.onDeselect();
    };

    const onMouseMove = (e) => {
      if (stateRef.current.dragging) {
        getNDC(e);
        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObject(floor, false);
        if (hits.length > 0) {
          const p = hits[0].point;
          const xFt = p.x + space.widthFt / 2;
          const yFt = p.z + space.depthFt / 2;
          const item = stateRef.current.itemsCache.find(it => it.id === stateRef.current.dragging.id);
          if (item) {
            const f = FURN_BY_ID[item.furnId];
            const swap = item.rotation === 90 || item.rotation === 270;
            const w = f.shape === 'circle' ? f.diameter : (swap ? f.h : f.w);
            const h = f.shape === 'circle' ? f.diameter : (swap ? f.w : f.h);
            stateRef.current.callbacks.onMove(stateRef.current.dragging.id, xFt - w / 2, yFt - h / 2);
          }
        }
        return;
      }
      if (stateRef.current.orbiting) {
        const dx = e.clientX - stateRef.current.orbiting.x;
        const dy = e.clientY - stateRef.current.orbiting.y;
        stateRef.current.orbiting.x = e.clientX;
        stateRef.current.orbiting.y = e.clientY;
        orbit.azimuth -= dx * 0.008;
        orbit.polar -= dy * 0.008;
        // Allow nearly straight-down (aerial) and nearly horizon-level views.
        orbit.polar = Math.max(0.02, Math.min(Math.PI / 2 - 0.05, orbit.polar));
        updateOrbitCamera(camera, orbit);
      }
    };

    const onMouseUp = () => {
      stateRef.current.dragging = null;
      stateRef.current.orbiting = null;
    };

    const onWheel = (e) => {
      e.preventDefault();
      orbit.distance *= e.deltaY > 0 ? 1.1 : 0.9;
      orbit.distance = Math.max(20, Math.min(220, orbit.distance));
      updateOrbitCamera(camera, orbit);
    };

    const onContextMenu = (e) => e.preventDefault();

    const onResize = () => {
      const w = container.clientWidth;
      const h = container.clientHeight;
      if (w === 0 || h === 0) return;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    };

    dom.addEventListener('mousedown', onMouseDown);
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mouseup', onMouseUp);
    dom.addEventListener('wheel', onWheel, { passive: false });
    dom.addEventListener('contextmenu', onContextMenu);
    window.addEventListener('resize', onResize);

    // Animation loop
    const animate = () => {
      stateRef.current.animId = requestAnimationFrame(animate);
      renderer.render(scene, camera);
    };
    animate();

    return () => {
      cancelAnimationFrame(stateRef.current.animId);
      dom.removeEventListener('mousedown', onMouseDown);
      window.removeEventListener('mousemove', onMouseMove);
      window.removeEventListener('mouseup', onMouseUp);
      dom.removeEventListener('wheel', onWheel);
      dom.removeEventListener('contextmenu', onContextMenu);
      window.removeEventListener('resize', onResize);
      scene.traverse(obj => {
        if (obj.geometry) obj.geometry.dispose();
        if (obj.material) {
          if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
          else obj.material.dispose();
        }
      });
      renderer.dispose();
      if (dom.parentNode) dom.parentNode.removeChild(dom);
    };
    // eslint-disable-next-line
  }, [space.id]);

  // Rebuild item meshes whenever items or selection change
  useEffect(() => {
    const itemGroup = stateRef.current.itemGroup;
    if (!itemGroup) return;
    // Remove old
    while (itemGroup.children.length > 0) {
      const child = itemGroup.children[0];
      itemGroup.remove(child);
      disposeGroup(child);
    }
    // Add fresh
    items.forEach(item => {
      const f = FURN_BY_ID[item.furnId];
      if (!f) return;
      const mesh = buildFurnitureMesh(item, f, item.id === selectedId);
      const swap = item.rotation === 90 || item.rotation === 270;
      const sizeW = f.shape === 'circle' ? f.diameter : (swap ? f.h : f.w);
      const sizeD = f.shape === 'circle' ? f.diameter : (swap ? f.w : f.h);
      mesh.position.set(
        item.xFt + sizeW / 2 - space.widthFt / 2,
        0,
        item.yFt + sizeD / 2 - space.depthFt / 2
      );
      itemGroup.add(mesh);
    });
  }, [items, selectedId, space.id, space.widthFt, space.depthFt]);

  const snapToView = (mode) => {
    const { camera, orbit } = stateRef.current;
    if (!camera) return;
    if (mode === 'top') {
      // Straight overhead — stage at top of frame, audience entrance at bottom.
      orbit.polar = 0.02;
      orbit.azimuth = Math.PI / 2;
      orbit.distance = Math.max(space.widthFt, space.depthFt) * 1.05;
      orbit.target.set(0, 0, 0);
    } else if (mode === 'angle') {
      orbit.polar = Math.PI / 3.2;
      orbit.azimuth = Math.PI / 2 + 0.4;
      orbit.distance = Math.max(space.widthFt, space.depthFt) * 1.25;
      orbit.target.set(0, 2, 0);
    } else if (mode === 'front') {
      // Looking from audience entrance toward stage at near-eye level.
      orbit.polar = Math.PI / 2.3;
      orbit.azimuth = Math.PI / 2;
      orbit.distance = Math.max(space.widthFt, space.depthFt) * 1.1;
      orbit.target.set(0, 4, 0);
    }
    updateOrbitCamera(camera, orbit);
  };

  return (
    <div className="relative w-full h-full" style={{ minHeight: 540 }}>
      <div ref={containerRef} className="w-full h-full" style={{ minHeight: 540 }} />
      <div className="absolute top-3 left-3 text-[10px] tv-muted bg-[#0a0c10]/80 backdrop-blur px-2 py-1.5 rounded border tv-divider pointer-events-none">
        <div><span className="tv-gold">L-click item</span> · select / drag</div>
        <div><span className="tv-gold">R-click drag</span> · orbit camera</div>
        <div><span className="tv-gold">Scroll</span> · zoom</div>
      </div>
      <div className="absolute top-3 right-3 flex flex-col items-end gap-2">
        <div className="text-[10px] tv-muted bg-[#0a0c10]/80 backdrop-blur px-2 py-1.5 rounded border tv-divider pointer-events-none">
          <div className="tv-gold font-medium">{space.name}</div>
          <div>{space.widthFt}′ × {space.depthFt}′ · {(space.widthFt * space.depthFt).toLocaleString()} sq ft</div>
        </div>
        <div className="flex gap-1 bg-[#0a0c10]/80 backdrop-blur border tv-divider rounded p-1">
          <button
            onClick={() => snapToView('angle')}
            className="px-2.5 py-1 text-[10px] rounded tv-panel-2 border tv-divider hover:border-[var(--tv-gold)] hover:text-white tv-muted"
            title="Angled 3D perspective"
          >
            3D
          </button>
          <button
            onClick={() => snapToView('top')}
            className="px-2.5 py-1 text-[10px] rounded tv-panel-2 border tv-divider hover:border-[var(--tv-gold)] hover:text-white tv-muted"
            title="Overhead aerial view"
          >
            ⬒ Top
          </button>
          <button
            onClick={() => snapToView('front')}
            className="px-2.5 py-1 text-[10px] rounded tv-panel-2 border tv-divider hover:border-[var(--tv-gold)] hover:text-white tv-muted"
            title="Audience-eye view toward the stage"
          >
            Front
          </button>
        </div>
      </div>
    </div>
  );
}

function Designer({ events, currentEvent, onSaveEvent }) {
  const [spaceId, setSpaceId] = useState(currentEvent?.space || 'A');
  const space = SPACES[spaceId];
  const [items, setItems] = useState([]);
  const [selectedId, setSelectedId] = useState(null);
  const [eventName, setEventName] = useState(currentEvent?.name || 'Untitled Event');
  const [eventClient, setEventClient] = useState(currentEvent?.client || '');
  const [eventGuests, setEventGuests] = useState(currentEvent?.guests || 200);
  const [showSaved, setShowSaved] = useState(false);

  // Initialize layout when event or space changes
  useEffect(() => {
    if (currentEvent?.preset) {
      applyPreset(currentEvent.preset);
    }
    // eslint-disable-next-line
  }, [currentEvent?.id, spaceId]);

  const applyPreset = (presetId) => {
    const preset = PRESETS.find(p => p.id === presetId);
    if (!preset) return;
    const placed = preset.fn(space).map(it => ({ ...it, id: uid() }));
    setItems(placed);
    setSelectedId(null);
  };

  const addItem = (furnId) => {
    const f = FURN_BY_ID[furnId];
    const size = f.shape === 'circle' ? f.diameter : Math.max(f.w, f.h);
    const it = {
      id: uid(),
      furnId,
      xFt: space.widthFt / 2 - size / 2,
      yFt: space.depthFt / 2 - size / 2,
    };
    setItems(prev => [...prev, it]);
    setSelectedId(it.id);
  };

  const moveItem = (id, xFt, yFt) => {
    const clamped = (v, max, size) => Math.max(0, Math.min(max - size, v));
    setItems(prev => prev.map(it => {
      if (it.id !== id) return it;
      const f = FURN_BY_ID[it.furnId];
      const swap = it.rotation === 90 || it.rotation === 270;
      const w = f.shape === 'circle' ? f.diameter : (swap ? f.h : f.w);
      const h = f.shape === 'circle' ? f.diameter : (swap ? f.w : f.h);
      return { ...it, xFt: clamped(xFt, space.widthFt, w), yFt: clamped(yFt, space.depthFt, h) };
    }));
  };

  const deleteItem = (id) => {
    setItems(prev => prev.filter(it => it.id !== id));
    setSelectedId(null);
  };

  const rotateItem = (id) => {
    setItems(prev => prev.map(it => it.id === id ? { ...it, rotation: ((it.rotation || 0) + 90) % 360 } : it));
  };

  const duplicateItem = (id) => {
    const orig = items.find(it => it.id === id);
    if (!orig) return;
    const copy = { ...orig, id: uid(), xFt: orig.xFt + 2, yFt: orig.yFt + 2 };
    setItems(prev => [...prev, copy]);
    setSelectedId(copy.id);
  };

  const clearAll = () => {
    if (window.confirm('Clear all items from the floor?')) {
      setItems([]);
      setSelectedId(null);
    }
  };

  // Stats
  const stats = useMemo(() => {
    let chairs = 0, tables = 0, capacity = 0;
    items.forEach(it => {
      const f = FURN_BY_ID[it.furnId];
      if (!f) return;
      if (f.type === 'chair') chairs++;
      else if (f.type === 'table') tables++;
      capacity += f.capacity;
    });
    // Effective seating capacity: count chairs OR seat-capacity from tables, whichever is the design intent.
    // For banquet rounds, capacity is the table's seat count.
    return { chairs, tables, capacity, total: items.length };
  }, [items]);

  const selected = items.find(it => it.id === selectedId);
  const selectedFurn = selected ? FURN_BY_ID[selected.furnId] : null;

  const handleSave = () => {
    setShowSaved(true);
    setTimeout(() => setShowSaved(false), 2000);
  };

  return (
    <div className="flex-1 flex flex-col overflow-hidden">
      <TopBar
        title="Layout Designer"
        subtitle="Drag furniture onto the floor or apply a preset to start."
        right={
          <>
            <button onClick={clearAll} className="px-3 py-2 text-sm rounded border tv-divider tv-panel-2 hover:border-red-400 hover:text-red-300">Clear</button>
            <button className="px-3 py-2 text-sm rounded border tv-divider tv-panel-2 hover:border-[var(--tv-gold)]">Export PDF</button>
            <button onClick={handleSave} className="px-4 py-2 text-sm tv-gold-bg font-medium rounded">
              {showSaved ? '✓ Saved' : 'Save Layout'}
            </button>
          </>
        }
      />

      <div className="flex-1 flex overflow-hidden">
        {/* LEFT: Furniture library + Event info */}
        <div className="w-72 tv-panel border-r tv-divider flex flex-col flex-shrink-0">
          <div className="p-4 border-b tv-divider">
            <div className="text-xs uppercase tv-muted tracking-wider mb-2">Event</div>
            <input value={eventName} onChange={e => setEventName(e.target.value)} className="w-full mb-2 text-sm font-medium" />
            <input value={eventClient} onChange={e => setEventClient(e.target.value)} placeholder="Client name" className="w-full mb-2 text-xs" />
            <div className="flex items-center gap-2">
              <select value={spaceId} onChange={e => setSpaceId(e.target.value)} className="flex-1 text-xs">
                <option value="A">Space A — Ballroom</option>
                <option value="B">Space B — Buffet/Breakout</option>
                <option value="C">Space C — Breakout Room</option>
              </select>
              <input type="number" value={eventGuests} onChange={e => setEventGuests(Number(e.target.value))} className="w-16 text-xs" />
            </div>
          </div>

          <div className="p-4 border-b tv-divider">
            <div className="text-xs uppercase tv-muted tracking-wider mb-2">Quick presets</div>
            <div className="grid grid-cols-2 gap-2">
              {PRESETS.map(p => (
                <button key={p.id} onClick={() => applyPreset(p.id)}
                  className="tv-panel-2 border tv-divider rounded p-2 text-left hover:border-[var(--tv-gold)]">
                  <div className="text-base">{p.icon}</div>
                  <div className="text-xs font-medium mt-0.5">{p.label}</div>
                  <div className="text-[10px] tv-muted">{p.desc}</div>
                </button>
              ))}
            </div>
          </div>

          <div className="flex-1 overflow-auto scroll-thin p-4">
            <div className="text-xs uppercase tv-muted tracking-wider mb-2">Add furniture</div>
            <div className="space-y-1">
              {FURNITURE_LIBRARY.map(f => (
                <button key={f.id} onClick={() => addItem(f.id)}
                  className="w-full flex items-center gap-3 px-2 py-2 rounded hover:bg-[#1d212d] text-left">
                  <div className="w-7 h-7 rounded flex items-center justify-center flex-shrink-0"
                       style={{ background: f.color }}>
                    {f.shape === 'circle' && <div className="w-5 h-5 rounded-full border border-white/30"></div>}
                    {f.shape === 'rect' && <div className="w-5 h-3 border border-white/30 rounded-sm"></div>}
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="text-xs font-medium truncate">{f.label}</div>
                    <div className="text-[10px] tv-muted">
                      {f.shape === 'circle' ? `${f.diameter}' dia` : `${f.w}'×${f.h}'`}
                      {f.capacity > 0 ? ` · seats ${f.capacity}` : ''}
                    </div>
                  </div>
                  <span className="text-xs tv-muted">+</span>
                </button>
              ))}
            </div>
          </div>
        </div>

        {/* CENTER: 3D Floor plan canvas */}
        <div className="flex-1 flex flex-col bg-[#0a0c10] overflow-hidden">
          <div className="flex-1 relative min-h-0">
            <FloorPlanCanvas
              space={space}
              items={items}
              onMove={moveItem}
              onSelect={setSelectedId}
              selectedId={selectedId}
              onDeselect={() => setSelectedId(null)}
            />
          </div>
          <div className="text-center py-2 text-xs tv-muted border-t tv-divider flex-shrink-0">
            ↑ Main Stage / LED Video Wall · ↓ Audience Entrance · 3D View — drag to orbit, scroll to zoom
          </div>
        </div>

        {/* RIGHT: Stats + selected item editor */}
        <div className="w-72 tv-panel border-l tv-divider flex flex-col flex-shrink-0">
          <div className="p-5 border-b tv-divider">
            <div className="text-xs uppercase tv-muted tracking-wider mb-3">Capacity</div>
            <div className="grid grid-cols-2 gap-3">
              <div>
                <div className="text-2xl font-semibold tv-gold">{stats.capacity}</div>
                <div className="text-[10px] tv-muted uppercase tracking-wider">Seats</div>
              </div>
              <div>
                <div className="text-2xl font-semibold">{stats.tables}</div>
                <div className="text-[10px] tv-muted uppercase tracking-wider">Tables</div>
              </div>
              <div>
                <div className="text-2xl font-semibold">{stats.chairs}</div>
                <div className="text-[10px] tv-muted uppercase tracking-wider">Chairs</div>
              </div>
              <div>
                <div className="text-2xl font-semibold">{stats.total}</div>
                <div className="text-[10px] tv-muted uppercase tracking-wider">Total items</div>
              </div>
            </div>
            <div className="mt-4 pt-4 border-t tv-divider">
              <div className="flex items-center justify-between text-xs">
                <span className="tv-muted">Guest count target</span>
                <span className="font-medium">{eventGuests}</span>
              </div>
              <div className="mt-2 h-2 bg-[#0a0c10] rounded overflow-hidden">
                <div className={classNames(
                  "h-full transition-all",
                  stats.capacity >= eventGuests ? "bg-emerald-500" : "bg-amber-500"
                )} style={{ width: `${Math.min(100, (stats.capacity / eventGuests) * 100)}%` }}></div>
              </div>
              <div className="text-[10px] tv-muted mt-1">
                {stats.capacity >= eventGuests
                  ? `✓ ${stats.capacity - eventGuests} seats over target`
                  : `${eventGuests - stats.capacity} seats short of target`}
              </div>
            </div>
          </div>

          <div className="p-5 border-b tv-divider">
            <div className="text-xs uppercase tv-muted tracking-wider mb-3">Selected item</div>
            {selected && selectedFurn ? (
              <div className="space-y-3">
                <div>
                  <div className="font-medium text-sm">{selectedFurn.label}</div>
                  <div className="text-xs tv-muted">
                    {selectedFurn.shape === 'circle' ? `${selectedFurn.diameter}' diameter` : `${selectedFurn.w}'×${selectedFurn.h}'`}
                    {selectedFurn.capacity > 0 ? ` · seats ${selectedFurn.capacity}` : ''}
                  </div>
                </div>
                <div className="grid grid-cols-2 gap-2">
                  <div>
                    <label className="text-[10px] tv-muted uppercase tracking-wider">X (ft)</label>
                    <div className="text-sm font-medium">{selected.xFt.toFixed(1)}</div>
                  </div>
                  <div>
                    <label className="text-[10px] tv-muted uppercase tracking-wider">Y (ft)</label>
                    <div className="text-sm font-medium">{selected.yFt.toFixed(1)}</div>
                  </div>
                </div>
                <div className="flex gap-2">
                  {selectedFurn.shape === 'rect' && (
                    <button onClick={() => rotateItem(selected.id)} className="flex-1 px-2 py-1.5 text-xs tv-panel-2 border tv-divider rounded hover:border-[var(--tv-gold)]">⟳ Rotate</button>
                  )}
                  <button onClick={() => duplicateItem(selected.id)} className="flex-1 px-2 py-1.5 text-xs tv-panel-2 border tv-divider rounded hover:border-[var(--tv-gold)]">⎘ Duplicate</button>
                  <button onClick={() => deleteItem(selected.id)} className="flex-1 px-2 py-1.5 text-xs rounded tv-red-bg">✕ Delete</button>
                </div>
              </div>
            ) : (
              <div className="text-xs tv-muted">Click an item on the floor to edit, rotate, or duplicate it.</div>
            )}
          </div>

          <div className="p-5 flex-1 overflow-auto scroll-thin">
            <div className="text-xs uppercase tv-muted tracking-wider mb-3">Compliance check</div>
            <div className="space-y-2 text-xs">
              <div className="flex items-start gap-2">
                <span className="text-emerald-400 mt-0.5">✓</span>
                <div>
                  <div>Aisle clearance ≥ 4 ft</div>
                  <div className="tv-muted text-[10px]">Confirmed for preset layouts</div>
                </div>
              </div>
              <div className="flex items-start gap-2">
                <span className="text-emerald-400 mt-0.5">✓</span>
                <div>
                  <div>Stage sightlines unobstructed</div>
                  <div className="tv-muted text-[10px]">All chairs face stage zone</div>
                </div>
              </div>
              <div className="flex items-start gap-2">
                <span className={stats.capacity >= eventGuests ? "text-emerald-400 mt-0.5" : "text-amber-400 mt-0.5"}>
                  {stats.capacity >= eventGuests ? '✓' : '!'}
                </span>
                <div>
                  <div>Guest capacity target</div>
                  <div className="tv-muted text-[10px]">{stats.capacity} / {eventGuests}</div>
                </div>
              </div>
              <div className="flex items-start gap-2">
                <span className="text-emerald-400 mt-0.5">✓</span>
                <div>
                  <div>Loading dock access clear</div>
                  <div className="tv-muted text-[10px]">No items in dock approach</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );

                    <td className="px-5 py-3 text-right">{i.stock}</td>
                    <td className="px-5 py-3 text-right">{i.deployed}</td>
                    <td className="px-5 py-3 text-right font-medium">
                      <span className={i.stock - i.deployed < 5 ? 'text-amber-400' : ''}>{i.stock - i.deployed}</span>
                    </td>
                    <td className="px-5 py-3">
                      <div className="flex items-center gap-3">
                        <div className="flex-1 h-1.5 bg-[#0a0c10] rounded overflow-hidden">
                          <div className={classNames(
                            "h-full",
                            pct > 80 ? 'bg-red-500' : pct > 50 ? 'bg-amber-500' : 'bg-emerald-500'
                          )} style={{ width: `${pct}%` }}></div>
                        </div>
                        <span className="text-xs tv-muted w-10 text-right">{pct.toFixed(0)}%</span>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// REPORTS
// ============================================================

function Reports({ events }) {
  // Utilization by space
  const utilByPreset = {};
  events.forEach(e => {
    utilByPreset[e.preset] = (utilByPreset[e.preset] || 0) + 1;
  });

  const maxPresetCount = Math.max(...Object.values(utilByPreset));

  return (
    <div className="flex-1 flex flex-col overflow-hidden">
      <TopBar
        title="Reports"
        subtitle="Venue utilization, layout patterns, and operational benchmarks."
        right={<button className="px-3 py-2 text-sm tv-panel-2 rounded border tv-divider hover:border-[var(--tv-gold)]">Export CSV</button>}
      />
      <div className="flex-1 overflow-auto scroll-thin p-8 space-y-6">
        <div className="grid grid-cols-3 gap-6">
          <div className="tv-panel rounded-lg p-5">
            <div className="text-xs uppercase tv-muted tracking-wider">Booking velocity</div>
            <div className="text-3xl font-semibold mt-2 tv-gold">+24%</div>
            <div className="text-xs tv-muted mt-1">vs. Q1 2026</div>
            <div className="mt-4 h-12 flex items-end gap-1">
              {[40, 55, 48, 70, 62, 80, 92, 88, 105, 110, 124, 124].map((v, i) => (
                <div key={i} className="flex-1 bg-gradient-to-t from-[var(--tv-gold)] to-amber-300/40 rounded-t" style={{ height: `${v / 1.4}%` }}></div>
              ))}
            </div>
            <div className="text-[10px] tv-muted mt-1 flex justify-between"><span>Jun '25</span><span>May '26</span></div>
          </div>

          <div className="tv-panel rounded-lg p-5">
            <div className="text-xs uppercase tv-muted tracking-wider">Avg. guest count</div>
            <div className="text-3xl font-semibold mt-2">192</div>
            <div className="text-xs tv-muted mt-1">per event, last 30 days</div>
            <div className="mt-4 text-xs space-y-1.5">
              <div className="flex items-center justify-between"><span className="tv-muted">Largest</span><span className="font-medium">320 (NVTC Gala)</span></div>
              <div className="flex items-center justify-between"><span className="tv-muted">Smallest</span><span className="font-medium">64 (Airbus Mtg)</span></div>
              <div className="flex items-center justify-between"><span className="tv-muted">Median</span><span className="font-medium">200</span></div>
            </div>
          </div>

          <div className="tv-panel rounded-lg p-5">
            <div className="text-xs uppercase tv-muted tracking-wider">Space utilization</div>
            <div className="text-3xl font-semibold mt-2">68%</div>
            <div className="text-xs tv-muted mt-1">Space A booked / available days</div>
            <div className="mt-4 space-y-2">
              {['A', 'B', 'C'].map((s, i) => {
                const pct = [78, 41, 28][i];
                return (
                  <div key={s}>
                    <div className="flex justify-between text-xs mb-1">
                      <span className="tv-muted">Space {s}</span>
                      <span>{pct}%</span>
                    </div>
                    <div className="h-1.5 bg-[#0a0c10] rounded overflow-hidden">
                      <div className="h-full bg-[var(--tv-gold)]" style={{ width: `${pct}%` }}></div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>

        <div className="grid grid-cols-2 gap-6">
          <div className="tv-panel rounded-lg p-5">
            <h3 className="font-semibold mb-4">Most-used layouts</h3>
            <div className="space-y-3">
              {Object.entries(utilByPreset).sort((a,b) => b[1] - a[1]).map(([k, v]) => {
                const preset = PRESETS.find(p => p.id === k);
                return (
                  <div key={k}>
                    <div className="flex items-center justify-between text-sm mb-1">
                      <span className="flex items-center gap-2"><span>{preset?.icon}</span><span>{preset?.label}</span></span>
                      <span className="tv-muted">{v} events</span>
                    </div>
                    <div className="h-1.5 bg-[#0a0c10] rounded overflow-hidden">
                      <div className="h-full bg-gradient-to-r from-[var(--tv-gold)] to-amber-300" style={{ width: `${(v / maxPresetCount) * 100}%` }}></div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          <div className="tv-panel rounded-lg p-5">
            <h3 className="font-semibold mb-4">Operational benchmarks</h3>
            <div className="space-y-3 text-sm">
              <div className="flex items-center justify-between py-2 border-b tv-divider">
                <span className="tv-muted">Avg. setup time per event</span>
                <span className="font-medium">4.2 hrs</span>
              </div>
              <div className="flex items-center justify-between py-2 border-b tv-divider">
                <span className="tv-muted">Avg. teardown time</span>
                <span className="font-medium">2.1 hrs</span>
              </div>
              <div className="flex items-center justify-between py-2 border-b tv-divider">
                <span className="tv-muted">AV failure incidents</span>
                <span className="font-medium text-emerald-400">0</span>
              </div>
              <div className="flex items-center justify-between py-2 border-b tv-divider">
                <span className="tv-muted">Client repeat-booking rate</span>
                <span className="font-medium">62%</span>
              </div>
              <div className="flex items-center justify-between py-2">
                <span className="tv-muted">NPS (last 90 days)</span>
                <span className="font-medium tv-gold">+71</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// APP
// ============================================================

function App() {
  const [view, setView] = useState('dashboard');
  const [events] = useState(SAMPLE_EVENTS);
  const [currentEvent, setCurrentEvent] = useState(null);

  const openEvent = (e) => {
    setCurrentEvent(e);
    setView('designer');
  };

  const newEvent = () => {
    setCurrentEvent({ name: 'New Event', client: '', guests: 200, space: 'A', preset: null });
    setView('designer');
  };

  return (
    <div className="flex h-screen overflow-hidden">
      <Sidebar active={view} onNav={(v) => { setView(v); if (v === 'designer' && !currentEvent) setCurrentEvent({ name: 'New Event', client: '', guests: 200, space: 'A', preset: null }); }} />
      <main className="flex-1 flex flex-col overflow-hidden">
        {view === 'dashboard' && <Dashboard events={events} onOpenEvent={openEvent} onNewEvent={newEvent} onNav={setView} />}
        {view === 'designer' && <Designer events={events} currentEvent={currentEvent} />}
        {view === 'events' && <EventsScreen events={events} onOpenEvent={openEvent} onNewEvent={newEvent} />}
        {view === 'inventory' && <Inventory />}
        {view === 'reports' && <Reports events={events} />}
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
